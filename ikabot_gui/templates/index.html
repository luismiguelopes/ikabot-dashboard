    const LangContext = createContext('en');

    function useLang() { return useContext(LangContext); }

    function useT() {
      const lang = useLang();
      return (key, params) => {
        const str = (TRANSLATIONS[lang] || TRANSLATIONS.en)[key] ?? key;
        if (!params) return str;
        return Object.entries(params).reduce(
          (s, [k, v]) => s.replace(new RegExp(`\\{${k}\\}`, 'g'), String(v)), str
        );
      };
    }

    function getLocale(lang) { return lang === 'pt' ? 'pt-PT' : 'en-GB'; }

    function loadLang() {
      try { return localStorage.getItem('ikabot_lang') || 'en'; } catch { return 'en'; }
    }

      { pt: 'Cristal',  en: 'Crystal', icon: 'fa-gem',         color: 'text-cyan-400'   },
      { pt: 'Enxofre',  en: 'Sulfur',  icon: 'fa-flask',       color: 'text-yellow-400' },
    ];

    const AUTO_REFRESH_SECONDS = 900; // 15 minutes

    const ALERT_DEFAULTS = {
      wineWarning:  8,   // hours
      wineCritical: 2,   // hours
      storageWarning: 95, // %
    };

    function loadThresholds() {
      try {
        const stored = localStorage.getItem('ikabot_alert_thresholds');
        return stored ? { ...ALERT_DEFAULTS, ...JSON.parse(stored) } : { ...ALERT_DEFAULTS };
      } catch { return { ...ALERT_DEFAULTS }; }
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────────

    function fmt(n) {
      const num = Number(n);
      if (n === null || n === undefined || isNaN(num)) return '—';
      return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
    }

    function fmtDuration(seconds) {
      if (seconds < 0 || seconds === -1) return '∞';
      if (seconds === 0) return '0s';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function fmtCountdown(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function fmtArrival(ts, lang = 'en') {
      if (!ts) return '—';
      const d = new Date(ts * 1000);
      return d.toLocaleTimeString(getLocale(lang), { hour: '2-digit', minute: '2-digit' });
    }

          }`}

          <span className="flex-1 text-left">{label}</span>
          {badge > 0 && (

              {badge}
            </span>
          )}
        </button>
      );
    }

            </div>
            <p className="text-slate-500 text-xs pl-10">Empire Dashboard</p>

            <NavItem icon="fa-triangle-exclamation" label={t('nav_alerts')} active={active === 'alerts'} onClick={() => setActive('alerts')}     badge={alertCount} />
            <NavItem icon="fa-chart-line"   label={t('nav_history')}     active={active === 'history'}    onClick={() => setActive('history')}    />
            <NavItem icon="fa-calculator"   label={t('nav_calculators')} active={active === 'calc'}       onClick={() => setActive('calc')}       />
            <NavItem icon="fa-earth-europe" label={t('nav_world')}       active={active === 'mundo'}      onClick={() => setActive('mundo')}      />
          </nav>

    // ─── Export CSV helper ────────────────────────────────────────────────────────

    function exportCsv(filename, rows) {
      const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    // ─── StorageBar ──────────────────────────────────────────────────────────────

    function StorageBar({ value, capacity }) {
      if (!capacity) return <span className="font-mono text-slate-600">{fmt(value)}</span>;
      const pct = Math.min(100, Math.round((value / capacity) * 100));
      const color = pct >= 95 ? 'bg-red-500' : pct >= 80 ? 'bg-yellow-400' : 'bg-indigo-400';
      return (
        <div className="flex flex-col items-center gap-0.5 min-w-[64px]">
          <span className="font-mono text-slate-700 text-xs leading-none">{fmt(value)}</span>
          <div className="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div className={`h-full rounded-full ${color}`} style={{ width: `${pct}%` }} />
          </div>
          <span className="text-slate-400 text-[10px] leading-none">{pct}%</span>
        </div>
      );
    }

    // ─── CitiesPage ──────────────────────────────────────────────────────────────

    // ─── BuildingsPage ───────────────────────────────────────────────────────────

    function BuildingsPage({ data }) {
      const t = useT();
      const { empireData } = data;
      const cities = Object.keys(empireData);
      const [filter, setFilter] = useState('all');
      const visible = filter === 'all' ? cities : cities.filter(c => c === filter);

      const buildingNames = useMemo(() => {
        const names = new Set();
        cities.forEach(c => Object.keys(empireData[c]).forEach(k => { if (!k.startsWith('_')) names.add(k); }));
        return [...names];
      }, [empireData]);

      const averages = useMemo(() => {
        const avgs = {};
        buildingNames.forEach(b => {
          const vals = cities.map(c => parseFloat(empireData[c][b])).filter(v => !isNaN(v));
          avgs[b] = vals.length > 0 ? vals.reduce((a, v) => a + v, 0) / vals.length : 0;
        });
        return avgs;
      }, [empireData]);

      const now = Math.floor(Date.now() / 1000);

      return (
        <div>
          <PageHeader icon="fa-landmark" title={t('buildings_title')}>
            <CitySelect cities={cities} value={filter} onChange={setFilter} />
          </PageHeader>

          <Card>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                    <th className="px-5 py-3 font-semibold text-left whitespace-nowrap sticky left-0 z-20 bg-slate-800 border-r border-slate-700">
                      {t('col_city')}
                    </th>
                    {buildingNames.map(b => <Th key={b} className="text-xs">{b}</Th>)}
                  </tr>
                </thead>
                <tbody>
                  {visible.map((city, i) => {
                    const cityData = empireData[city];
                    const hasConstruction = Object.entries(cityData).some(([k, v]) => !k.startsWith('_') && String(v).includes('+'));
                    const constrEnds = cityData['_constructionEnds'] || 0;
                    const constrLeft = constrEnds > now ? constrEnds - now : 0;
                    const rowBg = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                    return (
                      <tr key={city} className={`border-b border-slate-100 hover:bg-indigo-50 transition-colors group ${rowBg}`}>
                        <td className={`px-5 py-2.5 text-sm font-semibold whitespace-nowrap sticky left-0 z-10 border-r border-slate-200 ${rowBg} group-hover:bg-indigo-50 ${hasConstruction ? 'text-orange-500' : 'text-slate-700'}`}>
                          {hasConstruction && <i className="fa-solid fa-hammer mr-1.5 text-orange-400 text-xs" />}
                          {city}
                          {constrLeft > 0 && (
                            <div className="text-[10px] text-orange-400 font-normal mt-0.5">
                              {fmtDuration(constrLeft)}
                            </div>
                          )}
                        </td>
                        {buildingNames.map(b => {
                          const val = cityData[b];
                          const numVal = parseFloat(val);
                          const isUnderConstruction = String(val).includes('+');
                          const isBelowAvg = !isUnderConstruction && !isNaN(numVal) && numVal < averages[b];
                          return (
                            <Td key={b} className={`text-center font-mono
                              ${isUnderConstruction ? 'text-orange-500 font-semibold' : ''}
                              ${isBelowAvg ? 'text-red-500 font-bold' : ''}
                              ${!isUnderConstruction && !isBelowAvg ? 'text-slate-600' : ''}
                            `}>
                              {val || '—'}
                            </Td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          <div className="flex gap-5 mt-4 text-xs text-slate-500">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-red-500 inline-block" />{t('legend_below_avg')}</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-orange-400 inline-block" />{t('legend_construction')}</span>
          </div>
        </div>
      );
    }

    // ─── MovementsPage ───────────────────────────────────────────────────────────

    function MovementsPage() {
      const [movements, setMovements] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/movements')
          .then(r => r.json())
          .then(setMovements)
          .catch(e => setError(e.message));
      }, []);

      const t = useT();
      const lang = useLang();

      if (error) return <p className="text-red-500 text-sm">{error}</p>;
      if (!movements) return <p className="text-slate-400 text-sm">{t('loading')}</p>;

      const own       = movements.filter(m => m.isOwn);
      const hostile   = movements.filter(m => m.isHostile);
      const allied    = movements.filter(m => !m.isOwn && !m.isHostile && m.isSameAlliance);
      const other     = movements.filter(m => !m.isOwn && !m.isHostile && !m.isSameAlliance);

      const Section = ({ title, items, color, icon }) => {
        if (items.length === 0) return null;
        return (
          <Card className="mb-4">
            <CardHeader icon={icon} title={`${title} (${items.length})`} />
            <div className="divide-y divide-slate-100">
              {items.map((m, i) => (
                <div key={i} className="px-5 py-3 flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm font-semibold ${color}`}>
                      {m.origin} <span className="font-mono">{m.direction}</span> {m.destination}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5">{m.mission}</div>
                    {m.resources && m.resources.length > 0 && (
                      <div className="text-xs text-slate-400 mt-1">
                        {m.resources.map((r, j) => <span key={j} className="mr-2">{r.amount} {r.resource}</span>)}
                      </div>
                    )}
                    {m.troops != null && (
                      <div className="text-xs text-red-400 mt-1">{t('troops')}: {fmt(m.troops)} | {t('fleets')}: {fmt(m.fleets)}</div>
                    )}
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-sm font-mono font-semibold text-slate-700">{fmtDuration(m.timeLeft)}</div>
                    <div className="text-xs text-slate-400">{t('arrives_at')} {fmtArrival(m.arrivalTime, lang)}</div>
                  </div>
                </div>
              ))}
            </div>
          </Card>
        );
      };

      return (
        <div>
          <PageHeader icon="fa-ship" title={t('movements_title')} />
          {movements.length === 0 ? (
            <Card className="p-8 text-center text-slate-400">
              <i className="fa-solid fa-anchor text-3xl mb-2 block" />
              {t('no_movements')}
            </Card>
          ) : (
            <>
              <Section title={t('section_own')}     items={own}     color="text-indigo-600" icon="fa-flag"              />
              <Section title={t('section_hostile')} items={hostile} color="text-red-600"    icon="fa-skull-crossbones"  />
              <Section title={t('section_allied')}  items={allied}  color="text-green-600"  icon="fa-handshake"         />
              <Section title={t('section_other')}   items={other}   color="text-slate-600"  icon="fa-circle-info"       />
            </>
          )}
        </div>
      );
    }

    // ─── AlertsPage ───────────────────────────────────────────────────────────────

    function ThresholdInput({ label, value, onChange, min, max, unit }) {
      return (
        <div className="flex items-center gap-2">
          <label className="text-xs text-slate-500 whitespace-nowrap">{label}</label>
          <input
            type="number"
            min={min} max={max}
            value={value}
            onChange={e => onChange(Math.max(min, Math.min(max, Number(e.target.value))))}
            className="w-16 border border-slate-200 rounded-lg px-2 py-1 text-xs text-center bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400"
          />
          <span className="text-xs text-slate-400">{unit}</span>
        </div>
      );
    }

    function AlertsPage({ data, thresholds, onSaveThresholds }) {
      const t = useT();
      const lang = useLang();
      const { resourcesData, statusSummary: s } = data;
      const [draft, setDraft] = useState(thresholds);
      const [settingsOpen, setSettingsOpen] = useState(false);

      const isDirty = JSON.stringify(draft) !== JSON.stringify(thresholds);

      const handleSave = () => { onSaveThresholds(draft); setSettingsOpen(false); };
      const handleReset = () => { setDraft({ ...ALERT_DEFAULTS }); };

      const alerts = [];

      Object.entries(resourcesData).forEach(([city, d]) => {
        const wine = d.wineRunsOutIn;
        if (wine !== -1 && wine !== undefined) {
          if (wine < thresholds.wineCritical * 3600)
            alerts.push({ level: 'critical', icon: 'fa-wine-bottle', color: 'text-red-600 bg-red-50 border-red-200', msg: t('alert_wine_critical', { city, duration: fmtDuration(wine) }) });
          else if (wine < thresholds.wineWarning * 3600)
            alerts.push({ level: 'warning', icon: 'fa-wine-bottle', color: 'text-yellow-700 bg-yellow-50 border-yellow-200', msg: t('alert_wine_warning', { city, duration: fmtDuration(wine) }) });
        }
      });

      Object.entries(resourcesData).forEach(([city, d]) => {
        const cap = d.storageCapacity;
        if (!cap) return;
        MATERIALS.forEach(m => {
          const val = d[m.en];
          if (val != null && val / cap >= thresholds.storageWarning / 100)
            alerts.push({ level: 'warning', icon: m.icon, color: 'text-yellow-700 bg-yellow-50 border-yellow-200', msg: t('alert_storage', { city, resource: m[lang], pct: Math.round(val/cap*100) }) });
        });
      });

      if (s.gold.production < 0)
        alerts.push({ level: 'critical', icon: 'fa-coins', color: 'text-red-600 bg-red-50 border-red-200', msg: t('alert_gold_neg', { val: fmt(s.gold.production) }) });

      if (s.ships.available === 0 && s.ships.total > 0)
        alerts.push({ level: 'info', icon: 'fa-ship', color: 'text-blue-600 bg-blue-50 border-blue-200', msg: t('alert_ships_busy', { n: s.ships.total }) });

      const critical = alerts.filter(a => a.level === 'critical');
      const warning  = alerts.filter(a => a.level === 'warning');
      const info     = alerts.filter(a => a.level === 'info');

      return (
        <div>
          <PageHeader icon="fa-triangle-exclamation" title={`${t('nav_alerts')} (${alerts.length})`}>
            <button
              onClick={() => { setDraft(thresholds); setSettingsOpen(v => !v); }}
              className={`flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${
                settingsOpen ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
              }`}
            >
              <i className="fa-solid fa-sliders" /> {t('configure')}
            </button>
          </PageHeader>

          {settingsOpen && (
            <Card className="mb-4">
              <div className="px-5 py-4">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">{t('thresholds_title')}</p>
                <div className="flex flex-wrap gap-6 items-end">
                  <div className="space-y-2">
                    <p className="text-xs font-medium text-slate-600 flex items-center gap-1.5">
                      <i className="fa-solid fa-wine-bottle text-red-400" /> {t('wine_group')}
                    </p>
                    <ThresholdInput label={t('warning_below')}  value={draft.wineWarning}  onChange={v => setDraft(d => ({ ...d, wineWarning: v }))}  min={1} max={72} unit="h" />
                    <ThresholdInput label={t('critical_below')} value={draft.wineCritical} onChange={v => setDraft(d => ({ ...d, wineCritical: v }))} min={1} max={24} unit="h" />
                  </div>
                  <div className="space-y-2">
                    <p className="text-xs font-medium text-slate-600 flex items-center gap-1.5">
                      <i className="fa-solid fa-warehouse text-slate-400" /> {t('storage_group')}
                    </p>
                    <ThresholdInput label={t('warning_above')} value={draft.storageWarning} onChange={v => setDraft(d => ({ ...d, storageWarning: v }))} min={50} max={99} unit="%" />
                  </div>

      const METRICS = [
        { key: 'gold',      label: t('metric_gold')      },
        { key: 'resources', label: t('metric_resources') },
        { key: 'ships',     label: t('metric_ships')     },
        { key: 'citizens',  label: t('metric_citizens')  },
      ];

      return (
        <div>
          <PageHeader icon="fa-chart-line" title={t('history_title')}>
            <div className="flex gap-1">
              {METRICS.map(m => (
                <button
                  key={m.key}
                  onClick={() => setMetric(m.key)}
                  className={`px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${metric === m.key ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                >
                  {m.label}
                </button>
              ))}
            </div>
          </PageHeader>

          <Card>
            <div className="bg-slate-800 rounded-xl p-4" style={{ height: '360px' }}>
              {!history ? (
                <div className="flex items-center justify-center h-full text-slate-400 text-sm">{t('loading_history')}</div>
              ) : history.length === 0 ? (
                <div className="flex items-center justify-center h-full text-slate-400 text-sm">
                  {t('no_history')}

          {history && history.length > 0 && (
            <p className="text-xs text-slate-400 mt-2">
              {t('history_note', {
                n: history.length,
                from: new Date(history[0].timestamp * 1000).toLocaleDateString(getLocale(lang)),

    // ─── NumInput helper ─────────────────────────────────────────────────────────

    function NumInput({ label, value, onChange, min = 0, step = 1 }) {
      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs font-medium text-slate-500 flex items-center gap-1">{label}</label>
          <input
            type="number"
            min={min}
            step={step}
            value={value === 0 ? '' : value}
            onChange={e => onChange(e.target.value === '' ? 0 : Number(e.target.value))}
            placeholder="0"
            className="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700 w-full font-mono"
          />
        </div>
      );
    }

    function fmtHours(hours, t) {
      if (!isFinite(hours) || hours > 1e9) return '∞';
      if (hours <= 0) return t ? t('available_now') : 'Available now!';
      const totalMins = Math.round(hours * 60);
      const d = Math.floor(totalMins / 1440);
      const h = Math.floor((totalMins % 1440) / 60);
      const m = totalMins % 60;
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function calcUpgradeTime(needed, available, production, gold, goldPrice) {
      const gp      = goldPrice || 15;
      const missing = needed.map((n, i) => Math.max(0, n - (available[i] || 0)));

      const totalNeeded     = needed.reduce((s, n) => s + n, 0);
      const totalAvailable  = available.reduce((s, a) => s + (a || 0), 0);
      const totalMissing    = Math.max(0, totalNeeded - totalAvailable);
      const totalProduction = production.reduce((s, p) => s + (p || 0), 0);
      const goldNeededAll   = totalMissing * gp;
      const canBuyAll       = gold >= goldNeededAll;

      const timeNoGold = totalProduction > 0
        ? totalMissing / totalProduction
        : (totalMissing > 0 ? Infinity : 0);

      let timeWithGold = canBuyAll ? 0 : timeNoGold;
      if (!canBuyAll && gold > 0) {
        const goldBuysUnits = gold / gp;
        const stillMissing  = Math.max(0, totalMissing - goldBuysUnits);
        timeWithGold = totalProduction > 0
          ? stillMissing / totalProduction
          : (stillMissing > 0 ? Infinity : 0);
      }

      return { missing, totalMissing, totalProduction, timeNoGold, timeWithGold, goldNeededAll, canBuyAll };
    }

    // cost keys from empireFunction match materials_names_tec order
    const COST_KEYS = ['wood', 'wine', 'marble', 'glass', 'sulfur'];

    function fmtTs(ts, lang = 'en') {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleString(getLocale(lang), { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function fmtScore(s, lang = 'en') {
      const n = parseInt(String(s || '').replace(/[,.\s\u00a0]/g, ''), 10) || 0;
      if (!n) return '—';
      return n.toLocaleString(getLocale(lang));
    }

    // ─── BuildingUpgradeCalc ──────────────────────────────────────────────────────

    function BuildingUpgradeCalc({ data }) {
      const t = useT();
      const lang = useLang();
      const { statusSummary } = data;
      const gold       = statusSummary.gold.total;
      const available  = statusSummary.resources.available;
      const production = statusSummary.resources.production;

      const [needed,    setNeeded]    = useState([0, 0, 0, 0, 0]);
      const [goldPrice, setGoldPrice] = useState(15);

      // Building costs data from API
      const [costsData,    setCostsData]    = useState(null);
      const [costsLoading, setCostsLoading] = useState(true);
      const [costsError,   setCostsError]   = useState(null);
      const [refreshMsg,   setRefreshMsg]   = useState('');

      // Auto-fill selection
      const [selCity,        setSelCity]        = useState('');
      const [selBuilding,    setSelBuilding]     = useState('');
      const [selTargetLevel, setSelTargetLevel]  = useState('');

      useEffect(() => {
        fetch('/api/building-costs')
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(d => { setCostsData(d); setCostsLoading(false); })
          .catch(() => { setCostsLoading(false); setCostsError(true); });
      }, []);

      // Reset building+level when city changes
      useEffect(() => { setSelBuilding(''); setSelTargetLevel(''); }, [selCity]);

      // Reset level+costs when building changes
      useEffect(() => { setSelTargetLevel(''); setNeeded([0, 0, 0, 0, 0]); }, [selBuilding]);

      // Auto-fill costs when full selection is made
      useEffect(() => {
        if (!costsData || !selCity || !selBuilding || !selTargetLevel) return;
        const bData = costsData.cities?.[selCity]?.[selBuilding];
        if (!bData) return;
        const target = parseInt(selTargetLevel, 10);
        const totals = [0, 0, 0, 0, 0];
        for (let lv = bData.currentLevel + 1; lv <= target; lv++) {
          const lvCost = bData.costs[String(lv)];
          if (lvCost) COST_KEYS.forEach((k, i) => { totals[i] += lvCost[k] || 0; });
        }
        setNeeded(totals);
      }, [selCity, selBuilding, selTargetLevel, costsData]);

      const handleForceRefresh = () => {
        setRefreshMsg('sending');
        fetch('/api/building-costs/refresh', { method: 'POST' })
          .then(r => r.json())
          .then(() => setRefreshMsg('ok'))
          .catch(() => setRefreshMsg('error'));
      };

      const handleClear = () => { setSelCity(''); setSelBuilding(''); setSelTargetLevel(''); setNeeded([0, 0, 0, 0, 0]); };

      const citiesWithData   = costsData ? Object.keys(costsData.cities || {}) : [];
      const buildingsForCity = selCity && costsData?.cities?.[selCity] ? Object.keys(costsData.cities[selCity]) : [];
      const selBuildingData  = selCity && selBuilding && costsData?.cities?.[selCity]?.[selBuilding];
      const availableLevels  = selBuildingData ? Object.keys(selBuildingData.costs).map(Number).sort((a, b) => a - b) : [];
      const autoFilled       = selTargetLevel !== '';

      const setRes = (i, v) => setNeeded(prev => { const n = [...prev]; n[i] = v; return n; });
      const r = calcUpgradeTime(needed, available, production, gold, goldPrice);
      const hasInput = needed.some(n => n > 0);

      const selectCls = "border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed";

      return (
        <div className="space-y-5">
          <div className="bg-indigo-50 border border-indigo-200 rounded-xl px-5 py-4 text-sm text-indigo-700 flex items-start gap-3">
            <i className="fa-solid fa-circle-info mt-0.5 flex-shrink-0" />
            <span>{t('upgrade_desc')}</span>
          </div>

          {/* ── Auto-fill panel ── */}
          {costsLoading && (
            <div className="flex items-center gap-2 text-slate-400 text-sm px-1">
              <div className="w-4 h-4 rounded-full border-2 border-slate-300 border-t-indigo-400 animate-spin" />
              {t('loading_costs')}
            </div>
          )}

          {!costsLoading && costsError && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-4 flex items-start justify-between gap-4">
              <div className="flex items-start gap-3 text-sm text-amber-700">
                <i className="fa-solid fa-triangle-exclamation mt-0.5 flex-shrink-0" />
                <span>{t('costs_unavailable')}</span>
              </div>
              <button
                onClick={handleForceRefresh}
                className="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium rounded-lg transition-colors"
              >
                <i className="fa-solid fa-rotate" /> {t('request_extraction')}
              </button>
            </div>
          )}

          {!costsLoading && costsData && (
            <Card>
              <CardHeader icon="fa-wand-magic-sparkles" title={t('autofill_title')} />
              <div className="p-5">
                <div className="flex flex-wrap gap-4 items-end mb-4">
                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-medium text-slate-500">{t('label_city')}</label>
                    <select className={selectCls} value={selCity} onChange={e => setSelCity(e.target.value)}>
                      <option value="">{t('select_placeholder')}</option>
                      {citiesWithData.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>

                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-medium text-slate-500">{t('label_building')}</label>
                    <select className={selectCls} value={selBuilding} onChange={e => setSelBuilding(e.target.value)} disabled={!selCity}>
                      <option value="">{t('select_placeholder')}</option>
                      {buildingsForCity.map(b => {
                        const lvl = costsData.cities[selCity][b].currentLevel;
                        return <option key={b} value={b}>{b} ({t('level_label', { n: lvl })})</option>;
                      })}
                    </select>
                  </div>

                  {selBuildingData && (
                    <div className="flex flex-col gap-1">
                      <label className="text-xs font-medium text-slate-500">
                        {t('current_level_label', { n: selBuildingData.currentLevel })}
                      </label>
                      <select className={selectCls} value={selTargetLevel} onChange={e => setSelTargetLevel(e.target.value)}>
                        <option value="">{t('select_placeholder')}</option>
                        {availableLevels.map(lv => <option key={lv} value={lv}>{lv}</option>)}
                      </select>
                    </div>
                  )}

                  {autoFilled && (
                    <button
                      onClick={handleClear}
                      className="flex items-center gap-1.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-medium rounded-lg transition-colors"
                    >
                      <i className="fa-solid fa-xmark" /> {t('clear')}
                    </button>
                  )}
                </div>

                <div className="flex flex-wrap items-center justify-between gap-2 pt-3 border-t border-slate-100">
                  <p className="text-xs text-slate-400">
                    <i className="fa-regular fa-clock mr-1" />
                    {t('last_extraction', { ts: fmtTs(costsData.lastUpdated, lang) })}
                    <span className="ml-2 text-slate-300">{t('updates_3d')}</span>
                  </p>
                  <div className="flex items-center gap-3">
                    {refreshMsg === 'sending' && <span className="text-xs text-slate-400">{t('sending_request')}</span>}
                    {refreshMsg === 'ok'      && <span className="text-xs text-emerald-600 font-medium">{t('scheduled_ok')}</span>}
                    {refreshMsg === 'error'   && <span className="text-xs text-red-500">{t('schedule_error')}</span>}
                    <button
                      onClick={handleForceRefresh}
                      className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium rounded-lg transition-colors"
                    >
                      <i className="fa-solid fa-rotate" /> {t('force_update')}
                    </button>
                  </div>
                </div>
              </div>
            </Card>
          )}

          {/* ── Resource inputs ── */}
          <Card>
            <CardHeader icon="fa-boxes-stacked" title={autoFilled
              ? t('resources_for', { building: selBuilding, cur: selBuildingData?.currentLevel, target: selTargetLevel })
              : t('resources_needed')
            } />
            <div className="p-5">
              {autoFilled && (
                <div className="mb-4 flex items-center gap-2 text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
                  <i className="fa-solid fa-circle-check" />
                  {t('autofilled_msg')}
                </div>
              )}
              <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-4 mb-5">
                {MATERIALS.map((m, i) => (
                  <NumInput
                    key={m.en}
                    label={<><i className={`fa-solid ${m.icon} ${m.color}`} /> {m[lang]}</>}
                    value={needed[i]}
                    onChange={v => setRes(i, v)}
                  />
                ))}
              </div>
              <div className="w-44">
                <NumInput
                  label={<><i className="fa-solid fa-coins text-yellow-500" /> {t('gold_price')}</>}
                  value={goldPrice}
                  onChange={setGoldPrice}
                  min={1}
                />
              </div>
            </div>
          </Card>

          {hasInput && (
            <Card>
              <CardHeader icon="fa-table-list" title={t('resource_status')} />
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                      <Th align="text-left" className="px-5">Resource</Th>
                      <Th>{t('col_needed')}</Th>
                      <Th>{t('col_available')}</Th>
                      <Th>{t('col_missing')}</Th>
                      <Th>{t('col_production')}</Th>
                    </tr>
                  </thead>
                  <tbody>
                    {MATERIALS.map((m, i) => {
                      const miss = r.missing[i];
                      return (
                        <tr key={m.en} className="border-b border-slate-100 hover:bg-slate-50">
                          <Td className="px-5 font-semibold text-slate-700">
                            <i className={`fa-solid ${m.icon} mr-1.5 ${m.color}`} />{m[lang]}
                          </Td>
                          <Td className="text-center font-mono">{fmt(needed[i])}</Td>
                          <Td className="text-center font-mono">{fmt(available[i])}</Td>
                          <Td className={`text-center font-mono font-bold ${miss > 0 ? 'text-red-500' : 'text-emerald-500'}`}>
                            {miss > 0 ? `−${fmt(miss)}` : <i className="fa-solid fa-check" />}
                          </Td>
                          <Td className="text-center font-mono text-slate-500">{fmt(production[i])}</Td>
                        </tr>
                      );
                    })}
                    <tr className="bg-slate-800 text-white text-xs font-bold">
                      <td className="px-5 py-2.5 text-left">TOTAL</td>
                      <td className="px-3 py-2.5 text-center font-mono">{fmt(needed.reduce((s,v)=>s+v,0))}</td>
                      <td className="px-3 py-2.5 text-center font-mono">{fmt(available.reduce((s,v)=>s+v,0))}</td>
                      <td className={`px-3 py-2.5 text-center font-mono ${r.totalMissing > 0 ? 'text-red-300' : 'text-emerald-300'}`}>
                        {r.totalMissing > 0 ? `−${fmt(r.totalMissing)}` : <i className="fa-solid fa-check" />}
                      </td>
                      <td className="px-3 py-2.5 text-center font-mono text-slate-300">{fmt(r.totalProduction)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          {hasInput && (
            <Card>
              <CardHeader icon="fa-clock" title={t('upgrade_time_title')} />
              <div className="p-5">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div className={`rounded-xl border-2 p-4 text-center ${r.timeNoGold === 0 ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-ban mr-1 text-slate-400" />{t('no_gold_buying')}
                    </div>
                    <div className={`text-2xl font-bold mt-2 ${r.timeNoGold === 0 ? 'text-emerald-600' : 'text-slate-700'}`}>
                      {r.timeNoGold === 0 ? t('have_everything') : fmtHours(r.timeNoGold, t)}
                    </div>
                    <div className="text-xs text-slate-400 mt-2">{t('empire_prod_only')}</div>
                  </div>

                  <div className={`rounded-xl border-2 p-4 text-center ${r.canBuyAll ? 'border-emerald-400 bg-emerald-50' : 'border-indigo-300 bg-indigo-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-coins mr-1 text-yellow-500" />{t('with_gold')}
                    </div>
                    <div className="text-xs text-yellow-700 font-semibold mb-2">{fmt(gold)} gold</div>
                    <div className={`text-2xl font-bold ${r.canBuyAll ? 'text-emerald-600' : 'text-indigo-600'}`}>
                      {r.canBuyAll ? t('have_everything') : fmtHours(r.timeWithGold, t)}
                    </div>
                    {!r.canBuyAll && r.timeWithGold < r.timeNoGold && (
                      <div className="text-xs text-indigo-500 mt-2 font-semibold">
                        {t('saves', { t: fmtHours(r.timeNoGold - r.timeWithGold, t) })}
                      </div>
                    )}
                  </div>

                  <div className={`rounded-xl border-2 p-4 text-center ${r.canBuyAll ? 'border-emerald-400 bg-emerald-50' : 'border-yellow-300 bg-yellow-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-bag-shopping mr-1" />{t('buy_all')}
                    </div>
                    <div className={`text-2xl font-bold mt-2 ${r.canBuyAll ? 'text-emerald-600' : 'text-yellow-700'}`}>
                      {fmt(r.goldNeededAll)} gold
                    </div>
                    <div className={`text-xs mt-2 font-semibold ${r.canBuyAll ? 'text-emerald-500' : 'text-red-500'}`}>
                      {r.canBuyAll ? t('have_enough_gold') : t('missing_gold_amount', { n: fmt(Math.round(r.goldNeededAll - gold)) })}
                    </div>
                  </div>
                </div>
              </div>
            </Card>
          )}
        </div>

                          className="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700"
                        >
                          {stoneMasonLevels.slice(0, -1).map(r => <option key={r[0]} value={r[0]}>{r[0]}</option>)}
                        </select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-xs font-medium text-slate-500">{t('target_level')}</label>
                        <select
                          value={stonTo}
                          onChange={e => setStonTo(+e.target.value)}

                        <span className="font-semibold text-slate-600">

                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-slate-500">{t('upgrade_cost_label')}</span>
                        <span className="font-semibold">
                          <i className="fa-solid fa-tree text-green-500 mr-1" />{fmt(effCostCity[0])} {MATERIALS[0][lang]}
                          {effCostCity[2] > 0 && <span className="ml-2"><i className="fa-solid fa-mountain text-slate-400 mr-1" />{fmt(effCostCity[2])} {MATERIALS[2][lang]}</span>}
                        </span>
                      </div>
                      <div className="text-xs text-slate-400 italic">{t('auto_computed_label')}</div>
                    </div>
                  </>
                )}
                <div className={`rounded-xl border-2 p-4 ${cityWins ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="text-xs text-slate-500 mb-1">{t('total_gain')}</div>
                      <div className="text-2xl font-bold text-slate-800">
                        {fmt(totalCityGain)} <span className="text-sm font-normal text-slate-400">{resName}/h</span>
                      </div>
                    </div>
                    {cityWins && <i className="fa-solid fa-trophy text-3xl text-yellow-500" />}
                  </div>
                  <div className="text-xs text-slate-500 mt-2">{t('equiv_cost', { n: fmt(costCityGold) })}</div>
                  {roiCity !== null && (
                    <div className="text-xs font-semibold text-indigo-600 mt-1">
                      ROI: {roiCity.toFixed(5)} {resName}/gold
                    </div>
                  )}
                  {cityWins && (
                    <div className="text-xs text-emerald-600 font-bold mt-2">
                      <i className="fa-solid fa-check-circle mr-1" />{t('best_option')}
                    </div>
                  )}
                </div>
              </div>
            </Card>
          </div>

          {showCompare && (
            <Card>
              <CardHeader icon="fa-scale-balanced" title={t('roi_comparison')} />
              <div className="p-5 space-y-4">
                {[
                  { label: `${islandBldName} ${t('island_label')}`,       gain: totalIslandGain, costGold: costIslandGold, roi: roiIsland, wins: islandWins },
                  { label: `${cityBldName} ${t('city_building_label')}`,   gain: totalCityGain,   costGold: costCityGold,   roi: roiCity,   wins: cityWins   },
                ].map((opt, i) => {
                  const barPct = maxRoi > 0 && opt.roi !== null ? Math.round((opt.roi / maxRoi) * 100) : 0;
                  return (
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm font-semibold text-slate-700 flex items-center gap-1">
                          {opt.wins && <i className="fa-solid fa-trophy text-yellow-500 text-xs" />}
                          {opt.label}
                        </span>
                        <div className="text-xs text-slate-500 text-right">
                          +{fmt(opt.gain)} {resName}/h &nbsp;|&nbsp; {fmt(opt.costGold)} {t('gold_label')}
                          {opt.roi !== null && <span className="ml-2 font-semibold text-indigo-600">ROI: {opt.roi.toFixed(5)}</span>}
                        </div>
                      </div>
                      <div className="w-full h-5 bg-slate-100 rounded-full overflow-hidden">
                        <div
                          className={`h-full rounded-full transition-all duration-500 flex items-center justify-end pr-2 text-white text-xs font-bold ${opt.wins ? 'bg-emerald-500' : 'bg-indigo-400'}`}
                          style={{ width: `${Math.max(barPct, 2)}%` }}
                        >
                          {barPct > 15 ? `${barPct}%` : ''}
                        </div>
                      </div>
                    </div>
                  );
                })}
                {(islandWins || cityWins) && (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 text-sm text-emerald-800 font-medium">
                    <i className="fa-solid fa-lightbulb mr-2 text-yellow-500" />
                    {islandWins
                      ? t('island_better', { name: islandBldName, n: numCities })
                      : t('city_better_roi', { name: cityBldName })
                    }
                  </div>
                )}
              </div>
            </Card>
          )}
        </div>
      );

    // ─── MundoPage ───────────────────────────────────────────────────────────────

    function MarkBadge({ status }) {
      const MARK_CONFIG = useMarkConfig();
      const cfg = MARK_CONFIG[status] || MARK_CONFIG.novo;
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cfg.bg} ${cfg.text}`}>
          {cfg.label}
        </span>
      );
    }

    function MarkSelect({ markKey, current, onChange }) {
      const MARK_CONFIG = useMarkConfig();
      return (
        <select
          value={current}
          onChange={e => onChange(markKey, e.target.value)}
          className={`text-xs rounded-full px-2 py-0.5 border font-medium cursor-pointer focus:outline-none
            ${MARK_CONFIG[current]?.bg || ''} ${MARK_CONFIG[current]?.text || ''} border-transparent`}

            <option key={k} value={k}>{v.label}</option>
          ))}
        </select>

    function parseScore(s) {
      if (!s) return 0;
      return parseInt(String(s).replace(/[,.\s\u00a0]/g, ''), 10) || 0;
    }

    function StatePill({ state }) {
      const t = useT();
      if (state === 'inactive') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">
          <span className="w-1.5 h-1.5 rounded-full bg-red-500 inline-block" /> {t('state_inactive')}
        </span>
      );
      if (state === 'vacation') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">
          <span className="w-1.5 h-1.5 rounded-full bg-yellow-500 inline-block" /> {t('state_vacation')}
        </span>
      );
      return <span className="text-slate-400 text-xs">{state}</span>;

    const RESOURCE_ICONS  = ['', 'fa-wine-bottle', 'fa-mountain', 'fa-gem', 'fa-flask'];
    const RESOURCE_COLORS = ['', 'text-red-400', 'text-slate-400', 'text-cyan-400', 'text-yellow-400'];

    function useResourceLabels() {
      const t = useT();
      return ['', t('res_wine'), t('res_marble'), t('res_crystal'), t('res_sulfur')];
    }

    function useMarkConfig() {
      const t = useT();
      return {
        novo:    { label: t('mark_novo'),    bg: 'bg-blue-100',   text: 'text-blue-700',   ring: 'ring-blue-300'   },
        alvo:    { label: t('mark_alvo'),    bg: 'bg-orange-100', text: 'text-orange-700', ring: 'ring-orange-300' },
        visto:   { label: t('mark_visto'),   bg: 'bg-slate-100',  text: 'text-slate-500',  ring: 'ring-slate-300'  },
        ignorar: { label: t('mark_ignorar'), bg: 'bg-slate-50',   text: 'text-slate-400',  ring: 'ring-slate-200'  },
      };
    }

    // ─── Inactivos sub-tab ───────────────────────────────────────────────────────

    function InactivosTab({ scanData, scanStatus, loading, error, marks, setMarks, onForceRefresh }) {
      const t = useT();
      const lang = useLang();
      const [filterDist, setFilterDist]   = useState(20);
      const [filterMark, setFilterMark]   = useState('excl_ignorar');
      const [filterNew, setFilterNew]     = useState(false);
      const [search, setSearch]           = useState('');
      const [sortKey, setSortKey]         = useState('distance');
      const [sortAsc, setSortAsc]         = useState(true);

      const handleMark = useCallback((markKey, status) => {
        setMarks(prev => ({ ...prev, [markKey]: status }));
        // markKey = "playerId_islandX_islandY"; island coords are always integers so no ambiguity
        const parts = markKey.split('_');
        const islandY = parts.pop();
        const islandX = parts.pop();
        const playerId = parts.join('_');
        fetch('/api/world-scan/mark', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId, islandX, islandY, status }),
        }).catch(() => {});
      }, [setMarks]);

      const players = useMemo(() => {
        if (!scanData?.players) return [];
        let list = scanData.players
          .filter(p => p.state === 'inactive')
          .map(p => {
            const markKey = `${p.playerId}_${p.islandX}_${p.islandY}`;
            return { ...p, markKey, mark: marks[markKey] || p.mark || 'novo' };
          });

        if (filterNew)  list = list.filter(p => p.isNew);
        if (filterMark === 'excl_ignorar') list = list.filter(p => p.mark !== 'ignorar');
        else if (filterMark !== 'all')     list = list.filter(p => p.mark === filterMark);
        if (filterDist > 0)  list = list.filter(p => p.distance <= filterDist);
        if (search.trim())   list = list.filter(p => (p.playerName || '').toLowerCase().includes(search.trim().toLowerCase()));

        list.sort((a, b) => {
          let va, vb;
          if (sortKey === 'distance')      { va = a.distance; vb = b.distance; }
          else if (sortKey === 'army')     { va = parseScore(a.scores?.army); vb = parseScore(b.scores?.army); }
          else if (sortKey === 'building') { va = parseScore(a.scores?.building); vb = parseScore(b.scores?.building); }
          else if (sortKey === 'player')   { va = a.playerName.toLowerCase(); vb = b.playerName.toLowerCase(); }
          else                             { va = a[sortKey]; vb = b[sortKey]; }
          if (va < vb) return sortAsc ? -1 : 1;
          if (va > vb) return sortAsc ? 1 : -1;
          return 0;
        });
        return list;
      }, [scanData, marks, filterMark, filterDist, filterNew, search, sortKey, sortAsc]);

      const newCount = useMemo(() =>
        (scanData?.players || []).filter(p => p.state === 'inactive' && p.isNew).length, [scanData]);

      const handleSort = (key) => {
        if (sortKey === key) setSortAsc(a => !a);
        else { setSortKey(key); setSortAsc(true); }
      };

      const SortTh = ({ colKey, children, align = 'text-center' }) => (
        <th
          className={`px-3 py-3 font-semibold ${align} whitespace-nowrap cursor-pointer select-none hover:bg-slate-700 transition-colors`}
          onClick={() => handleSort(colKey)}
        >
          {children}
          {sortKey === colKey && <span className="ml-1 opacity-70">{sortAsc ? '↑' : '↓'}</span>}
        </th>
      );

      const handleExportCsv = () => {
        const header = [t('col_player'), t('col_alliance'), 'New?', t('col_island'), 'Coord', 'Nearest city', t('col_dist'),
                        'Military score', 'Building score', 'Rank', t('col_mark')];
        const rows = [header, ...players.map(p => [
          p.playerName, p.allyTag || '—', p.isNew ? 'Yes' : 'No',
          p.islandName, `(${p.islandX},${p.islandY})`,
          p.nearestOwnCity, p.distance,
          fmtScore(p.scores?.army, lang), fmtScore(p.scores?.building, lang), p.scores?.rank || '—',
          p.mark,
        ])];
        exportCsv(`inactive_${new Date().toISOString().slice(0,10)}.csv`, rows);
      };

      if (loading) return <Card className="p-8 text-center text-slate-400 text-sm">{t('loading')}</Card>;
      if (error)   return (
        <Card className="p-8 text-center">
          <p className="text-slate-500 text-sm mb-3">{error}</p>
          <button onClick={onForceRefresh} className="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm rounded-lg">
            {t('force_first_scan')}
          </button>
        </Card>
      );

      return (
        <div>
          {/* Filters */}
          <Card className="mb-4">
            <div className="px-5 py-3 flex flex-wrap items-center gap-3">
              <button
                onClick={() => setFilterNew(v => !v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${
                  filterNew
                    ? 'bg-emerald-500 text-white border-emerald-500'
                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                }`}
              >
                <i className="fa-solid fa-star" />
                {t('new_this_week')} {newCount > 0 && <span className={`ml-1 px-1.5 rounded-full text-[10px] font-bold ${filterNew ? 'bg-emerald-400 text-white' : 'bg-emerald-100 text-emerald-700'}`}>{newCount}</span>}
              </button>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500 whitespace-nowrap">{t('max_dist')}</label>
                <select value={filterDist} onChange={e => setFilterDist(Number(e.target.value))}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  {[5, 8, 10, 15, 20, 30, 0].map(v => <option key={v} value={v}>{v === 0 ? t('all') : `≤ ${v}`}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500">{t('filter_mark')}</label>
                <select value={filterMark} onChange={e => setFilterMark(e.target.value)}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  <option value="excl_ignorar">{t('excl_ignored')}</option>
                  <option value="all">{t('all')}</option>
                  <option value="novo">{t('only_new')}</option>
                  <option value="alvo">{t('only_target')}</option>
                  <option value="visto">{t('only_seen')}</option>
                </select>
              </div>
              <input type="text" placeholder={t('search_player')} value={search} onChange={e => setSearch(e.target.value)}
                className="border border-slate-200 rounded-lg px-3 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 flex-1 min-w-[160px]" />
              <button onClick={handleExportCsv}
                className="ml-auto flex items-center gap-1.5 px-3 py-1.5 text-xs text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                <i className="fa-solid fa-download" /> CSV
              </button>
            </div>
          </Card>

          {players.length === 0 ? (
            <Card className="p-8 text-center text-slate-400 text-sm">{t('no_players_found')}</Card>
          ) : (
            <Card>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                      <SortTh colKey="player" align="text-left">{t('col_player')}</SortTh>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">{t('col_alliance')}</th>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">{t('col_island')}</th>
                      <SortTh colKey="distance">{t('col_dist')}</SortTh>
                      <SortTh colKey="army">{t('col_military')}</SortTh>
                      <SortTh colKey="building">{t('col_buildings_score')}</SortTh>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">{t('col_mark')}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {players.map((p, idx) => (
                      <tr key={p.markKey}
                        className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${p.mark === 'ignorar' ? 'opacity-40' : ''} ${idx % 2 ? 'bg-slate-50/40' : ''}`}>
                        <Td className="font-medium text-slate-800">
                          <div className="flex items-center gap-1.5">
                            {p.playerName}
                            {p.isNew && (
                              <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700">
                                <i className="fa-solid fa-star text-[8px]" /> {t('new_badge')}
                              </span>
                            )}
                          </div>
                        </Td>
                        <Td className="text-center">
                          {p.allyTag
                            ? <span className="px-1.5 py-0.5 bg-indigo-50 text-indigo-700 rounded text-xs font-mono">{p.allyTag}</span>
                            : <span className="text-slate-300">—</span>}
                        </Td>
                        <Td className="text-center">
                          <span className="text-slate-700 font-medium">{p.islandName}</span>
                          <span className="text-slate-400 text-xs ml-1">({p.islandX},{p.islandY})</span>
                          <br /><span className="text-slate-400 text-xs">{p.cityName}</span>
                        </Td>
                        <Td className="text-center">
                          <span className="font-mono text-slate-700 text-sm font-semibold">{p.distance}</span>
                          <br /><span className="text-slate-400 text-xs">{p.nearestOwnCity}</span>
                        </Td>
                        <Td className="text-center font-mono text-slate-700">
                          {fmtScore(p.scores?.army, lang)}
                          {p.scores?.rank && <div className="text-slate-400 text-[10px]">#{p.scores.rank}</div>}
                        </Td>
                        <Td className="text-center font-mono text-slate-600 text-xs">
                          {fmtScore(p.scores?.building, lang)}
                        </Td>
                        <Td className="text-center">
                          <MarkSelect markKey={p.markKey} current={p.mark} onChange={handleMark} />
                        </Td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="px-5 py-3 border-t border-slate-100 text-xs text-slate-400">
                {players.length !== 1 ? t('player_count_plural', { n: players.length }) : t('player_count_single', { n: players.length })}
                {newCount > 0 && <span className="ml-2 text-emerald-600 font-medium">{t('new_count_note', { n: newCount })}</span>}
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ─── Ilhas sub-tab ───────────────────────────────────────────────────────────

    function IlhasTab({ scanData, loading, error, onForceRefresh }) {
      const t = useT();
      const lang = useLang();
      const RESOURCE_LABELS = useResourceLabels();
      const [filterDist, setFilterDist]     = useState(0);
      const [filterFree, setFilterFree]     = useState(true);
      const [filterOwn, setFilterOwn]       = useState(false);
      const [filterResource, setFilterResource] = useState(0);
      const [sortKey, setSortKey]           = useState('freeSlots');
      const [sortAsc, setSortAsc]           = useState(false);

      const islands = useMemo(() => {
        if (!scanData?.islands) return [];
        let list = [...scanData.islands];
        if (filterFree)       list = list.filter(i => i.freeSlots > 0);
        if (!filterOwn)       list = list.filter(i => !i.hasOwnCity);
        if (filterResource)   list = list.filter(i => i.resourceType === filterResource);
        if (filterDist > 0)   list = list.filter(i => i.distance <= filterDist);

        list.sort((a, b) => {
          let va, vb;
          if (sortKey === 'freeSlots')   { va = a.freeSlots; vb = b.freeSlots; }
          else if (sortKey === 'wood')   { va = parseInt(a.woodLevel) || 0; vb = parseInt(b.woodLevel) || 0; }
          else if (sortKey === 'luxury') { va = parseInt(a.luxuryLevel) || 0; vb = parseInt(b.luxuryLevel) || 0; }
          else if (sortKey === 'distance') { va = a.distance; vb = b.distance; }
          else { va = a[sortKey]; vb = b[sortKey]; }
          if (va < vb) return sortAsc ? -1 : 1;
          if (va > vb) return sortAsc ? 1 : -1;
          return 0;
        });
        return list;
      }, [scanData, filterFree, filterOwn, filterResource, filterDist, sortKey, sortAsc]);

      const handleSort = (key) => {
        if (sortKey === key) setSortAsc(a => !a);
        else { setSortKey(key); setSortAsc(false); }
      };

      const SortTh = ({ colKey, children }) => (
        <th className="px-3 py-3 font-semibold text-center whitespace-nowrap cursor-pointer select-none hover:bg-slate-700 transition-colors"
          onClick={() => handleSort(colKey)}>
          {children}{sortKey === colKey && <span className="ml-1 opacity-70">{sortAsc ? '↑' : '↓'}</span>}
        </th>
      );

      const handleExportCsv = () => {
        const header = [t('col_island'), 'Coord', t('col_resource'), t('col_forest'), 'Lux.', t('col_wonder'), 'Lv Wonder', t('col_free_slots'), 'Total Slots', 'Nearest city', t('col_dist')];
        const rows = [header, ...islands.map(i => [
          i.islandName, `(${i.x},${i.y})`,
          RESOURCE_LABELS[i.resourceType] || '—', i.woodLevel || '—', i.luxuryLevel || '—',
          i.wonder || '—', i.wonderLevel || '—', i.freeSlots, i.totalSlots,
          i.nearestOwnCity, i.distance,
        ])];
        exportCsv(`islands_${new Date().toISOString().slice(0,10)}.csv`, rows);
      };

      if (loading) return <Card className="p-8 text-center text-slate-400 text-sm">{t('loading')}</Card>;
      if (error || !scanData?.islands) return (
        <Card className="p-8 text-center">
          <p className="text-slate-500 text-sm mb-3">{error || t('islands_not_available')}</p>
          <button onClick={onForceRefresh} className="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm rounded-lg">{t('force_scan')}</button>
        </Card>
      );

      return (
        <div>
          <Card className="mb-4">
            <div className="px-5 py-3 flex flex-wrap items-center gap-3">
              <button onClick={() => setFilterFree(v => !v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${filterFree ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                <i className="fa-solid fa-circle-plus" /> {t('only_free_slots')}
              </button>
              <button onClick={() => setFilterOwn(v => !v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${filterOwn ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                <i className="fa-solid fa-flag" /> {t('include_own_islands')}
              </button>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500">{t('filter_resource')}</label>
                <select value={filterResource} onChange={e => setFilterResource(Number(e.target.value))}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  <option value={0}>{t('all')}</option>
                  {RESOURCE_LABELS.slice(1).map((l, i) => <option key={i+1} value={i+1}>{l}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500 whitespace-nowrap">{t('max_dist')}</label>
                <select value={filterDist} onChange={e => setFilterDist(Number(e.target.value))}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  {[5, 8, 10, 15, 20, 0].map(v => <option key={v} value={v}>{v === 0 ? t('all') : `≤ ${v}`}</option>)}
                </select>
              </div>
              <button onClick={handleExportCsv}
                className="ml-auto flex items-center gap-1.5 px-3 py-1.5 text-xs text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                <i className="fa-solid fa-download" /> CSV
              </button>
            </div>
          </Card>

          {islands.length === 0 ? (
            <Card className="p-8 text-center text-slate-400 text-sm">{t('no_islands_found')}</Card>
          ) : (
            <Card>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                      <th className="px-3 py-3 font-semibold text-left whitespace-nowrap">{t('col_island')}</th>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">{t('col_resource')}</th>
                      <SortTh colKey="wood">{t('col_forest')}</SortTh>
                      <SortTh colKey="luxury">{t('col_lux_level')}</SortTh>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">{t('col_wonder')}</th>
                      <SortTh colKey="freeSlots">{t('col_free_slots')}</SortTh>
                      <SortTh colKey="distance">{t('col_dist')}</SortTh>
                    </tr>
                  </thead>
                  <tbody>
                    {islands.map((isl, idx) => (
                      <tr key={isl.islandId}
                        className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${idx % 2 ? 'bg-slate-50/40' : ''}`}>
                        <Td className="font-medium text-slate-800">
                          {isl.islandName}
                          <span className="text-slate-400 text-xs ml-1">({isl.x},{isl.y})</span>
                          {isl.hasOwnCity && <span className="ml-1.5 text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded-full font-medium">{t('own_city_badge')}</span>}
                        </Td>
                        <Td className="text-center">
                          {isl.resourceType > 0 && (
                            <span className={`flex items-center justify-center gap-1 text-xs font-medium ${RESOURCE_COLORS[isl.resourceType]}`}>
                              <i className={`fa-solid ${RESOURCE_ICONS[isl.resourceType]}`} />
                              {RESOURCE_LABELS[isl.resourceType]}
                            </span>
                          )}
                        </Td>
                        <Td className="text-center font-mono text-slate-700">{isl.woodLevel || '—'}</Td>
                        <Td className="text-center font-mono text-slate-700">{isl.luxuryLevel || '—'}</Td>
                        <Td className="text-center text-slate-600 text-xs">
                          {isl.wonder
                            ? <span>{isl.wonder}{isl.wonderLevel ? <span className="text-slate-400 ml-1">Lv {isl.wonderLevel}</span> : null}</span>
                            : <span className="text-slate-300">—</span>}
                        </Td>
                        <Td className="text-center">
                          <span className={`font-bold text-sm ${isl.freeSlots > 0 ? 'text-emerald-600' : 'text-slate-400'}`}>
                            {isl.freeSlots}
                          </span>
                          <span className="text-slate-400 text-xs">/{isl.totalSlots}</span>
                        </Td>
                        <Td className="text-center">
                          <span className="font-mono text-slate-700 text-sm font-semibold">{isl.distance}</span>
                          <br /><span className="text-slate-400 text-xs">{isl.nearestOwnCity}</span>
                        </Td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="px-5 py-3 border-t border-slate-100 text-xs text-slate-400">
                {islands.length !== 1 ? t('island_count_plural', { n: islands.length }) : t('island_count_single', { n: islands.length })}
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ─── MundoPage (shell with sub-tabs) ────────────────────────────────────────

    function MundoPage() {
      const t = useT();
      const lang = useLang();
      const [tab, setTab]             = useState('inactivos');
      const [scanData, setScanData]   = useState(null);
      const [scanStatus, setScanStatus] = useState(null);
      const [loading, setLoading]     = useState(true);
      const [error, setError]         = useState(null);
      const [marks, setMarks]         = useState({});

      const fetchScan = useCallback(() => {
        fetch('/api/world-scan')
          .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e.error)))
          .then(d => {
            setScanData(d);
            const m = {};
            (d.players || []).forEach(p => {
              const mk = `${p.playerId}_${p.islandX}_${p.islandY}`;
              m[mk] = p.mark || 'novo';
            });
            setMarks(m);
            setLoading(false);
          })
          .catch(e => { setError(typeof e === 'string' ? e : 'Error loading scan data'); setLoading(false); });
      }, []);

      const fetchStatus = useCallback(() => {
        fetch('/api/world-scan/status').then(r => r.json()).then(setScanStatus).catch(() => {});
      }, []);

      useEffect(() => { fetchScan(); fetchStatus(); }, []);

      useEffect(() => {
        if (scanStatus?.status !== 'running') return;
        const t = setInterval(() => {
          fetchStatus();
          if (scanStatus?.status !== 'running') fetchScan();
        }, 5000);
        return () => clearInterval(t);
      }, [scanStatus?.status]);

      const handleForceRefresh = () => {
        fetch('/api/world-scan/refresh', { method: 'POST' })
          .then(() => alert(t('scan_scheduled_msg')));
      };

      const isRunning = scanStatus?.status === 'running';
      const lastUpdated = scanData?.lastUpdated
        ? new Date(scanData.lastUpdated * 1000).toLocaleString(getLocale(lang)) : null;
      const nextScan = scanData?.lastUpdated
        ? new Date((scanData.lastUpdated + 7 * 24 * 3600) * 1000).toLocaleDateString(getLocale(lang)) : null;
      const inactiveCount = (scanData?.players || []).filter(p => p.state === 'inactive').length;
      const newCount = (scanData?.players || []).filter(p => p.state === 'inactive' && p.isNew).length;

      const TABS = [
        { key: 'inactivos', label: t('tab_inactive'), icon: 'fa-user-slash' },
        { key: 'ilhas',     label: t('tab_islands'),  icon: 'fa-map'        },
      ];

      return (
        <div>
          <PageHeader icon="fa-earth-europe" title={t('world_title')} />

          {/* Status card */}
          <Card className="mb-4">
            <div className="px-5 py-4 flex flex-wrap items-center gap-4">
              <div className="flex-1 min-w-0 space-y-1">
                {lastUpdated ? (
                  <p className="text-sm text-slate-600">
                    <i className="fa-regular fa-clock mr-1.5 text-slate-400" />
                    {t('last_scan_label')} <span className="font-medium text-slate-800">{lastUpdated}</span>
                    {nextScan && <span className="ml-3 text-slate-400 text-xs">{t('next_scan_label')} {nextScan}</span>}
                  </p>
                ) : (
                  <p className="text-sm text-slate-500">{t('no_scan_yet')}</p>
                )}
                {scanData && (
                  <p className="text-xs text-slate-400">
                    {t('scan_radius')}: {scanData.scanRadius}
                    {' · '}{t('inactive_label')}: <span className="font-semibold text-slate-600">{inactiveCount}</span>
                    {newCount > 0 && <span className="ml-1.5 text-emerald-600 font-semibold">{t('new_count_world', { n: newCount })}</span>}
                    {scanData.islands && <span>{' · '}{t('islands_count_world')}: <span className="font-semibold text-slate-600">{scanData.islands.length}</span></span>}
                  </p>
                )}
                {isRunning && (
                  <div className="mt-2">
                    <p className="text-xs text-indigo-600 mb-1 flex items-center gap-1.5">
                      <span className="w-3 h-3 rounded-full border-2 border-indigo-300 border-t-indigo-600 animate-spin inline-block" />
                      {scanStatus.message}
                    </p>
                    {scanStatus.total > 0 && (
                      <div className="w-full max-w-xs h-1.5 bg-slate-200 rounded-full overflow-hidden">
                        <div className="h-full bg-indigo-500 rounded-full transition-all"
                          style={{ width: `${Math.round((scanStatus.progress / scanStatus.total) * 100)}%` }} />
                      </div>
                    )}
                  </div>
                )}
              </div>
              <button onClick={handleForceRefresh} disabled={isRunning}
                className="flex items-center gap-2 px-4 py-2 bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors">
                <i className="fa-solid fa-rotate" />
                {isRunning ? t('scanning') : t('force_scan')}
              </button>
            </div>
          </Card>

          {/* Sub-tabs */}
          <div className="flex gap-1 mb-4 bg-white border border-slate-200 rounded-xl p-1 shadow-sm w-fit">
            {TABS.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  tab === t.key ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'
                }`}>
                <i className={`fa-solid ${t.icon} text-xs`} />{t.label}
              </button>
            ))}
          </div>

          {tab === 'inactivos' && (
            <InactivosTab
              scanData={scanData} scanStatus={scanStatus}
              loading={loading} error={error}
              marks={marks} setMarks={setMarks}
              onForceRefresh={handleForceRefresh}
            />
          )}
          {tab === 'ilhas' && (
            <IlhasTab
              scanData={scanData} loading={loading} error={error}
              onForceRefresh={handleForceRefresh}
            />
          )}
        </div>
      );
    }

    // ─── Loading / Error screens ─────────────────────────────────────────────────

    function LoadingScreen() {
      const t = useT();
      return (
        <div className="flex items-center justify-center h-screen bg-slate-100">
          <div className="text-center">
            <div className="w-12 h-12 rounded-full border-4 border-indigo-200 border-t-indigo-600 animate-spin mx-auto mb-4" />
            <p className="text-slate-500 text-sm">{t('loading_empire')}</p>
          </div>
        </div>
      );
    }

    function ErrorScreen({ message }) {
      const t = useT();
      return (
        <div className="flex items-center justify-center h-screen bg-slate-100">
          <div className="bg-white rounded-xl border border-red-200 shadow p-8 text-center max-w-sm">
            <div className="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
              <i className="fa-solid fa-triangle-exclamation text-red-400 text-xl" />
            </div>
            <h2 className="text-slate-800 font-semibold mb-2">{t('error_loading')}</h2>
            <p className="text-red-500 text-sm">{message}</p>
            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg transition-colors">
              {t('try_again')}
            </button>
          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────────

    function App() {
      const [lang, setLang] = useState(loadLang);
      const toggleLang = useCallback(() => {
        setLang(prev => {
          const next = prev === 'en' ? 'pt' : 'en';
          try { localStorage.setItem('ikabot_lang', next); } catch {}
          return next;
        });
      }, []);

      const [page, setPage]       = useState('home');
      const [data, setData]       = useState(null);
      const [error, setError]     = useState(null);
      const [countdown, setCountdown] = useState(AUTO_REFRESH_SECONDS);
      const [thresholds, setThresholds] = useState(loadThresholds);

      const saveThresholds = useCallback(t => {
        setThresholds(t);
        try { localStorage.setItem('ikabot_alert_thresholds', JSON.stringify(t)); } catch {}
      }, []);

      const fetchData = useCallback(() => {
        fetch('/api/data')
          .then(r => r.json())
          .then(d => { d.error ? setError(d.error) : setData(d); })
          .catch(e => setError(e.message));
      }, []);

      // Initial load
      useEffect(() => { fetchData(); }, []);

      // Auto-refresh timer
      useEffect(() => {
        setCountdown(AUTO_REFRESH_SECONDS);
        const interval = setInterval(() => {
          setCountdown(prev => {
            if (prev <= 1) { fetchData(); return AUTO_REFRESH_SECONDS; }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [fetchData]);

      const alertCount = useMemo(() => {
        if (!data) return 0;
        let n = 0;
        Object.values(data.resourcesData).forEach(d => {
          const t = d.wineRunsOutIn;
          if (t !== -1 && t !== undefined && t < thresholds.wineWarning * 3600) n++;
          const cap = d.storageCapacity;
          if (cap) MATERIALS.forEach(m => { if ((d[m.en] || 0) / cap >= thresholds.storageWarning / 100) n++; });
        });
        if (data.statusSummary.gold.production < 0) n++;
        return n;
      }, [data, thresholds]);

      // Movements badge from last fetch (we track count via a separate small fetch)
      const [movCount, setMovCount] = useState(0);
      useEffect(() => {
        fetch('/api/movements').then(r => r.json()).then(m => setMovCount(m.filter(x => x.isOwn).length)).catch(() => {});
      }, [data]);

      if (error) return <LangContext.Provider value={lang}><ErrorScreen message={error} /></LangContext.Provider>;
      if (!data)  return <LangContext.Provider value={lang}><LoadingScreen /></LangContext.Provider>;

      return (
        <LangContext.Provider value={lang}>
        <div className="flex h-screen overflow-hidden">
          <Sidebar
            active={page}
            setActive={setPage}
            lastUpdated={data.lastUpdated}
            lastUpdatedTs={data.lastUpdatedTs}
            alertCount={alertCount}
            movCount={movCount}
            countdown={countdown}
            lang={lang}
            toggleLang={toggleLang}
          />
          <main className="flex-1 overflow-y-auto bg-slate-100 p-6 md:p-8">
            {page === 'home'      && <HomePage      data={data} />}
            {page === 'cities'    && <CitiesPage    data={data} />}
            {page === 'buildings' && <BuildingsPage data={data} />}
            {page === 'movements' && <MovementsPage />}
            {page === 'alerts'    && <AlertsPage    data={data} thresholds={thresholds} onSaveThresholds={saveThresholds} />}
            {page === 'history'   && <HistoryPage />}
            {page === 'calc'      && <CalculadorasPage data={data} />}
            {page === 'mundo'     && <MundoPage />}
          </main>
        </div>
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  {% endraw %}
</body>
</html>
