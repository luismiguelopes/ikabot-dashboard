<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ikabot Empire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 font-sans">
  <div id="root"></div>

  {% raw %}
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─── Constants ───────────────────────────────────────────────────────────────

    const MATERIALS = [
      { pt: 'Madeira',  en: 'Wood',    icon: 'fa-tree',        color: 'text-green-500'  },
      { pt: 'Vinho',    en: 'Wine',    icon: 'fa-wine-bottle', color: 'text-red-400'    },
      { pt: 'Mármore',  en: 'Marble',  icon: 'fa-mountain',    color: 'text-slate-400'  },
      { pt: 'Cristal',  en: 'Crystal', icon: 'fa-gem',         color: 'text-cyan-400'   },
      { pt: 'Enxofre',  en: 'Sulfur',  icon: 'fa-flask',       color: 'text-yellow-400' },
    ];

    const AUTO_REFRESH_SECONDS = 300; // 5 minutes

    // ─── Helpers ─────────────────────────────────────────────────────────────────

    function fmt(n) {
      const num = Number(n);
      if (n === null || n === undefined || isNaN(num)) return '—';
      return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
    }

    function fmtDuration(seconds) {
      if (seconds < 0 || seconds === -1) return '∞';
      if (seconds === 0) return '0s';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function fmtCountdown(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function fmtArrival(ts) {
      if (!ts) return '—';
      const d = new Date(ts * 1000);
      return d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Sidebar ─────────────────────────────────────────────────────────────────

    function NavItem({ icon, label, active, onClick, badge }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 ${
            active
              ? 'bg-indigo-600 text-white shadow'
              : 'text-slate-400 hover:bg-slate-700 hover:text-slate-100'
          }`}
        >
          <i className={`fa-solid ${icon} w-4 text-center text-sm`} />
          <span className="flex-1 text-left">{label}</span>
          {badge > 0 && (
            <span className="bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">
              {badge}
            </span>
          )}
        </button>
      );
    }

    function Sidebar({ active, setActive, lastUpdated, lastUpdatedTs, alertCount, movCount, countdown }) {
      const isStale = lastUpdatedTs && (Date.now() / 1000 - lastUpdatedTs) > 70 * 60;
      return (
        <aside className="w-56 flex-shrink-0 bg-slate-900 flex flex-col h-screen">
          <div className="px-5 py-6 border-b border-slate-700/60">
            <div className="flex items-center gap-2 mb-1">
              <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
                <i className="fa-solid fa-globe text-white text-sm" />
              </div>
              <span className="text-white font-bold text-base tracking-tight">Ikabot</span>
            </div>
            <p className="text-slate-500 text-xs pl-10">Empire Dashboard</p>
          </div>

          <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
            <NavItem icon="fa-house"        label="Início"       active={active === 'home'}       onClick={() => setActive('home')}       />
            <NavItem icon="fa-city"         label="Cidades"      active={active === 'cities'}     onClick={() => setActive('cities')}     />
            <NavItem icon="fa-landmark"     label="Edifícios"    active={active === 'buildings'}  onClick={() => setActive('buildings')}  />
            <NavItem icon="fa-ship"         label="Movimentos"   active={active === 'movements'}  onClick={() => setActive('movements')}  badge={movCount} />
            <NavItem icon="fa-triangle-exclamation" label="Alertas" active={active === 'alerts'} onClick={() => setActive('alerts')}     badge={alertCount} />
            <NavItem icon="fa-chart-line"   label="Histórico"    active={active === 'history'}    onClick={() => setActive('history')}    />
            <NavItem icon="fa-calculator"   label="Calculadoras" active={active === 'calc'}        onClick={() => setActive('calc')}       />
            <NavItem icon="fa-earth-europe" label="Mundo"        active={active === 'mundo'}       onClick={() => setActive('mundo')}      />
          </nav>

          <div className="px-4 py-4 border-t border-slate-700/60 space-y-2">
            {isStale && (
              <div className="flex items-center gap-1.5 text-yellow-400 text-xs">
                <i className="fa-solid fa-triangle-exclamation" />
                Dados desatualizados
              </div>
            )}
            <p className={`text-xs leading-tight ${isStale ? 'text-yellow-500' : 'text-slate-600'}`}>
              <i className="fa-regular fa-clock mr-1" />
              {lastUpdated}
            </p>
            {countdown !== null && (
              <p className="text-slate-600 text-xs">
                <i className="fa-solid fa-arrows-rotate mr-1" />
                Refresh em {fmtCountdown(countdown)}
              </p>
            )}
          </div>
        </aside>
      );
    }

    // ─── Shared UI ───────────────────────────────────────────────────────────────

    function PageHeader({ icon, title, children }) {
      return (
        <div className="flex items-center justify-between mb-6">
          <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
            <i className={`fa-solid ${icon} text-indigo-500`} />
            {title}
          </h1>
          {children}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-xl border border-slate-200 shadow-sm ${className}`}>
          {children}
        </div>
      );
    }

    function CardHeader({ icon, title }) {
      return (
        <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
          <i className={`fa-solid ${icon} text-indigo-400 text-sm`} />
          <h2 className="text-sm font-semibold text-slate-700">{title}</h2>
        </div>
      );
    }

    function Th({ children, align = 'text-center', className = '' }) {
      return <th className={`px-3 py-3 font-semibold ${align} ${className} whitespace-nowrap`}>{children}</th>;
    }

    function Td({ children, className = '' }) {
      return <td className={`px-3 py-2.5 text-sm ${className}`}>{children}</td>;
    }

    function CitySelect({ cities, value, onChange }) {
      return (
        <select
          value={value}
          onChange={e => onChange(e.target.value)}
          className="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700"
        >
          <option value="all">Todas as cidades</option>
          {cities.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      );
    }

    // ─── Export CSV helper ────────────────────────────────────────────────────────

    function exportCsv(filename, rows) {
      const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    // ─── HomePage ─────────────────────────────────────────────────────────────────

    function StatBadge({ icon, iconColor, label, value }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 flex items-center gap-3">
          <div className={`w-10 h-10 rounded-lg flex items-center justify-center bg-slate-50 ${iconColor}`}>
            <i className={`fa-solid ${icon} text-base`} />
          </div>
          <div className="min-w-0">
            <p className="text-xs text-slate-400 leading-none mb-1 truncate">{label}</p>
            <p className="text-lg font-bold text-slate-800 font-mono leading-none">{value}</p>
          </div>
        </div>
      );
    }

    function HomePage({ data }) {
      const { statusSummary: s } = data;
      const res = s.resources;
      const totalAvail = res.available.reduce((a, b) => a + b, 0);
      const totalProd  = res.production.reduce((a, b) => a + b, 0);

      return (
        <div>
          <PageHeader icon="fa-crown" title="Resumo do Império" />

          <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 mb-6">
            <StatBadge icon="fa-anchor"       iconColor="text-blue-500"    label="Navios Disponíveis"  value={fmt(s.ships.available)}    />
            <StatBadge icon="fa-ship"         iconColor="text-blue-600"    label="Navios Totais"        value={fmt(s.ships.total)}        />
            <StatBadge icon="fa-house"        iconColor="text-emerald-500" label="Espaço Habitacional" value={fmt(s.housing.space)}      />
            <StatBadge icon="fa-people-group" iconColor="text-purple-500"  label="Cidadãos"             value={fmt(s.housing.citizens)}   />
            <StatBadge icon="fa-coins"        iconColor="text-yellow-500"  label="Ouro Total"           value={fmt(s.gold.total)}         />
            <StatBadge icon="fa-chart-line"   iconColor="text-yellow-600"  label="Produção de Ouro"     value={fmt(s.gold.production)}    />
            <StatBadge icon="fa-wine-glass"   iconColor="text-red-400"     label="Consumo de Vinho"     value={fmt(s.wine_consumption)}   />
          </div>

          <Card>
            <CardHeader icon="fa-boxes-stacked" title="Recursos e Produção" />
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                    <Th align="text-left" className="px-5">Tipo</Th>
                    {MATERIALS.map(m => (
                      <Th key={m.en}>
                        <i className={`fa-solid ${m.icon} mr-1 ${m.color}`} /> {m.pt}
                      </Th>
                    ))}
                    <Th className="text-indigo-300">Total</Th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { label: 'Disponível', values: res.available,  total: totalAvail },
                    { label: 'Produção/h', values: res.production, total: totalProd  },
                  ].map((row, ri) => (
                    <tr key={ri} className={`border-b border-slate-100 hover:bg-slate-50 ${ri % 2 ? 'bg-slate-50/40' : ''}`}>
                      <Td className="px-5 font-semibold text-slate-600">{row.label}</Td>
                      {row.values.map((v, i) => (
                        <Td key={i} className="text-center font-mono text-slate-700">{fmt(v)}</Td>
                      ))}
                      <Td className="text-center font-bold font-mono text-indigo-600">{fmt(row.total)}</Td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    // ─── StorageBar ──────────────────────────────────────────────────────────────

    function StorageBar({ value, capacity }) {
      if (!capacity) return <span className="font-mono text-slate-600">{fmt(value)}</span>;
      const pct = Math.min(100, Math.round((value / capacity) * 100));
      const color = pct >= 95 ? 'bg-red-500' : pct >= 80 ? 'bg-yellow-400' : 'bg-indigo-400';
      return (
        <div className="flex flex-col items-center gap-0.5 min-w-[64px]">
          <span className="font-mono text-slate-700 text-xs leading-none">{fmt(value)}</span>
          <div className="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div className={`h-full rounded-full ${color}`} style={{ width: `${pct}%` }} />
          </div>
          <span className="text-slate-400 text-[10px] leading-none">{pct}%</span>
        </div>
      );
    }

    // ─── CitiesPage ──────────────────────────────────────────────────────────────

    function CitiesPage({ data }) {
      const { resourcesData } = data;
      const cities = Object.keys(resourcesData);
      const [filter, setFilter] = useState('all');
      const visible = filter === 'all' ? cities : cities.filter(c => c === filter);

      const handleExport = () => {
        const header = ['Cidade', ...MATERIALS.map(m => m.pt), 'Armazém', 'Vinho/h (prod)', 'Vinho/h (cons)', 'Vinho acaba em'];
        const rows = [header, ...visible.map(city => {
          const d = resourcesData[city];
          const wineRunsOut = d.wineRunsOutIn === -1 ? '∞' : fmtDuration(d.wineRunsOutIn);
          return [
            city,
            ...MATERIALS.map(m => d[m.en] ?? ''),
            d.storageCapacity ?? '',
            d.wineProductionPerHour ?? '',
            d.wineConsumptionPerHour ?? '',
            wineRunsOut,
          ];
        })];
        exportCsv(`recursos_${new Date().toISOString().slice(0,10)}.csv`, rows);
      };

      return (
        <div>
          <PageHeader icon="fa-city" title="Recursos das Cidades">
            <div className="flex items-center gap-2">
              <CitySelect cities={cities} value={filter} onChange={setFilter} />
              <button
                onClick={handleExport}
                className="flex items-center gap-1.5 px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium rounded-lg transition-colors"
              >
                <i className="fa-solid fa-file-csv" /> CSV
              </button>
            </div>
          </PageHeader>

          <Card>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                    <Th align="text-left" className="px-5">Cidade</Th>
                    {MATERIALS.map(m => (
                      <Th key={m.en}>
                        <i className={`fa-solid ${m.icon} mr-1 ${m.color}`} /> {m.pt}
                      </Th>
                    ))}
                    <Th><i className="fa-solid fa-wine-glass mr-1 text-red-400" /> Vinho</Th>
                    <Th>Armazém</Th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((city, i) => {
                    const d = resourcesData[city];
                    const cap = d.storageCapacity || 0;
                    const wineRunsOut = d.wineRunsOutIn;
                    const wineUrgent = wineRunsOut !== -1 && wineRunsOut !== undefined && wineRunsOut < 4 * 3600;
                    const wineWarning = wineRunsOut !== -1 && wineRunsOut !== undefined && wineRunsOut < 12 * 3600;

                    return (
                      <tr key={city} className={`border-b border-slate-100 hover:bg-indigo-50/60 transition-colors ${i % 2 ? 'bg-slate-50/50' : ''}`}>
                        <Td className="px-5 font-semibold text-slate-700">{city}</Td>
                        {MATERIALS.map(m => (
                          <Td key={m.en} className="text-center">
                            <StorageBar value={d[m.en]} capacity={cap} />
                          </Td>
                        ))}
                        <Td className={`text-center font-mono text-xs ${wineUrgent ? 'text-red-600 font-bold' : wineWarning ? 'text-yellow-600 font-semibold' : 'text-slate-500'}`}>
                          {wineUrgent && <i className="fa-solid fa-triangle-exclamation mr-1" />}
                          {fmtDuration(wineRunsOut)}
                          <div className="text-[10px] text-slate-400">
                            {fmt(d.wineProductionPerHour)}/{fmt(d.wineConsumptionPerHour)} /h
                          </div>
                        </Td>
                        <Td className="text-center text-xs font-mono text-slate-500">
                          {fmt(cap)}
                        </Td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
          <p className="text-xs text-slate-400 mt-2">Barras de recursos mostram % do armazém. Vermelho = &gt;95%, Amarelo = &gt;80%.</p>
        </div>
      );
    }

    // ─── BuildingsPage ───────────────────────────────────────────────────────────

    function BuildingsPage({ data }) {
      const { empireData } = data;
      const cities = Object.keys(empireData);
      const [filter, setFilter] = useState('all');
      const visible = filter === 'all' ? cities : cities.filter(c => c === filter);

      const buildingNames = useMemo(() => {
        const names = new Set();
        cities.forEach(c => Object.keys(empireData[c]).forEach(k => { if (!k.startsWith('_')) names.add(k); }));
        return [...names];
      }, [empireData]);

      const averages = useMemo(() => {
        const avgs = {};
        buildingNames.forEach(b => {
          const vals = cities.map(c => parseFloat(empireData[c][b])).filter(v => !isNaN(v));
          avgs[b] = vals.length > 0 ? vals.reduce((a, v) => a + v, 0) / vals.length : 0;
        });
        return avgs;
      }, [empireData]);

      const now = Math.floor(Date.now() / 1000);

      return (
        <div>
          <PageHeader icon="fa-landmark" title="Edifícios do Império">
            <CitySelect cities={cities} value={filter} onChange={setFilter} />
          </PageHeader>

          <Card>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                    <th className="px-5 py-3 font-semibold text-left whitespace-nowrap sticky left-0 z-20 bg-slate-800 border-r border-slate-700">
                      Cidade
                    </th>
                    {buildingNames.map(b => <Th key={b} className="text-xs">{b}</Th>)}
                  </tr>
                </thead>
                <tbody>
                  {visible.map((city, i) => {
                    const cityData = empireData[city];
                    const hasConstruction = Object.entries(cityData).some(([k, v]) => !k.startsWith('_') && String(v).includes('+'));
                    const constrEnds = cityData['_constructionEnds'] || 0;
                    const constrLeft = constrEnds > now ? constrEnds - now : 0;
                    const rowBg = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                    return (
                      <tr key={city} className={`border-b border-slate-100 hover:bg-indigo-50 transition-colors group ${rowBg}`}>
                        <td className={`px-5 py-2.5 text-sm font-semibold whitespace-nowrap sticky left-0 z-10 border-r border-slate-200 ${rowBg} group-hover:bg-indigo-50 ${hasConstruction ? 'text-orange-500' : 'text-slate-700'}`}>
                          {hasConstruction && <i className="fa-solid fa-hammer mr-1.5 text-orange-400 text-xs" />}
                          {city}
                          {constrLeft > 0 && (
                            <div className="text-[10px] text-orange-400 font-normal mt-0.5">
                              {fmtDuration(constrLeft)}
                            </div>
                          )}
                        </td>
                        {buildingNames.map(b => {
                          const val = cityData[b];
                          const numVal = parseFloat(val);
                          const isUnderConstruction = String(val).includes('+');
                          const isBelowAvg = !isUnderConstruction && !isNaN(numVal) && numVal < averages[b];
                          return (
                            <Td key={b} className={`text-center font-mono
                              ${isUnderConstruction ? 'text-orange-500 font-semibold' : ''}
                              ${isBelowAvg ? 'text-red-500 font-bold' : ''}
                              ${!isUnderConstruction && !isBelowAvg ? 'text-slate-600' : ''}
                            `}>
                              {val || '—'}
                            </Td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          <div className="flex gap-5 mt-4 text-xs text-slate-500">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-red-500 inline-block" />Abaixo da média</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm bg-orange-400 inline-block" />Em construção (tempo restante abaixo do nome)</span>
          </div>
        </div>
      );
    }

    // ─── MovementsPage ───────────────────────────────────────────────────────────

    function MovementsPage() {
      const [movements, setMovements] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/movements')
          .then(r => r.json())
          .then(setMovements)
          .catch(e => setError(e.message));
      }, []);

      if (error) return <p className="text-red-500 text-sm">{error}</p>;
      if (!movements) return <p className="text-slate-400 text-sm">A carregar…</p>;

      const own       = movements.filter(m => m.isOwn);
      const hostile   = movements.filter(m => m.isHostile);
      const allied    = movements.filter(m => !m.isOwn && !m.isHostile && m.isSameAlliance);
      const other     = movements.filter(m => !m.isOwn && !m.isHostile && !m.isSameAlliance);

      const Section = ({ title, items, color, icon }) => {
        if (items.length === 0) return null;
        return (
          <Card className="mb-4">
            <CardHeader icon={icon} title={`${title} (${items.length})`} />
            <div className="divide-y divide-slate-100">
              {items.map((m, i) => (
                <div key={i} className="px-5 py-3 flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm font-semibold ${color}`}>
                      {m.origin} <span className="font-mono">{m.direction}</span> {m.destination}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5">{m.mission}</div>
                    {m.resources && m.resources.length > 0 && (
                      <div className="text-xs text-slate-400 mt-1">
                        {m.resources.map((r, j) => <span key={j} className="mr-2">{r.amount} {r.resource}</span>)}
                      </div>
                    )}
                    {m.troops != null && (
                      <div className="text-xs text-red-400 mt-1">Tropas: {fmt(m.troops)} | Frotas: {fmt(m.fleets)}</div>
                    )}
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-sm font-mono font-semibold text-slate-700">{fmtDuration(m.timeLeft)}</div>
                    <div className="text-xs text-slate-400">chega às {fmtArrival(m.arrivalTime)}</div>
                  </div>
                </div>
              ))}
            </div>
          </Card>
        );
      };

      return (
        <div>
          <PageHeader icon="fa-ship" title="Movimentos de Navios" />
          {movements.length === 0 ? (
            <Card className="p-8 text-center text-slate-400">
              <i className="fa-solid fa-anchor text-3xl mb-2 block" />
              Sem movimentos activos
            </Card>
          ) : (
            <>
              <Section title="Os meus movimentos" items={own}     color="text-indigo-600" icon="fa-flag"              />
              <Section title="Ataques inimigos"   items={hostile} color="text-red-600"    icon="fa-skull-crossbones"  />
              <Section title="Aliados"            items={allied}  color="text-green-600"  icon="fa-handshake"         />
              <Section title="Outros"             items={other}   color="text-slate-600"  icon="fa-circle-info"       />
            </>
          )}
        </div>
      );
    }

    // ─── AlertsPage ───────────────────────────────────────────────────────────────

    function AlertsPage({ data }) {
      const { resourcesData, statusSummary: s } = data;
      const alerts = [];

      // Wine alerts
      Object.entries(resourcesData).forEach(([city, d]) => {
        const t = d.wineRunsOutIn;
        if (t !== -1 && t !== undefined) {
          if (t < 2 * 3600) alerts.push({ level: 'critical', icon: 'fa-wine-bottle', color: 'text-red-600 bg-red-50 border-red-200', msg: `${city}: Vinho acaba em ${fmtDuration(t)}!` });
          else if (t < 8 * 3600) alerts.push({ level: 'warning', icon: 'fa-wine-bottle', color: 'text-yellow-700 bg-yellow-50 border-yellow-200', msg: `${city}: Vinho acaba em ${fmtDuration(t)}` });
        }
      });

      // Storage overflow alerts (> 95%)
      Object.entries(resourcesData).forEach(([city, d]) => {
        const cap = d.storageCapacity;
        if (!cap) return;
        MATERIALS.forEach(m => {
          const val = d[m.en];
          if (val != null && val / cap >= 0.95) {
            alerts.push({ level: 'warning', icon: m.icon, color: 'text-yellow-700 bg-yellow-50 border-yellow-200', msg: `${city}: ${m.pt} a ${Math.round(val/cap*100)}% do armazém` });
          }
        });
      });

      // Negative gold production
      if (s.gold.production < 0) {
        alerts.push({ level: 'critical', icon: 'fa-coins', color: 'text-red-600 bg-red-50 border-red-200', msg: `Produção de ouro negativa: ${fmt(s.gold.production)}/h` });
      }

      // All ships busy
      if (s.ships.available === 0 && s.ships.total > 0) {
        alerts.push({ level: 'info', icon: 'fa-ship', color: 'text-blue-600 bg-blue-50 border-blue-200', msg: `Todos os ${s.ships.total} navios estão ocupados` });
      }

      const critical = alerts.filter(a => a.level === 'critical');
      const warning  = alerts.filter(a => a.level === 'warning');
      const info     = alerts.filter(a => a.level === 'info');

      return (
        <div>
          <PageHeader icon="fa-triangle-exclamation" title={`Alertas (${alerts.length})`} />
          {alerts.length === 0 ? (
            <Card className="p-10 text-center">
              <i className="fa-solid fa-circle-check text-4xl text-emerald-400 mb-3 block" />
              <p className="text-slate-600 font-semibold">Tudo em ordem!</p>
              <p className="text-slate-400 text-sm mt-1">Nenhum alerta activo.</p>
            </Card>
          ) : (
            <div className="space-y-3">
              {[...critical, ...warning, ...info].map((a, i) => (
                <div key={i} className={`flex items-center gap-3 px-4 py-3 rounded-xl border ${a.color}`}>
                  <i className={`fa-solid ${a.icon} text-lg flex-shrink-0`} />
                  <span className="text-sm font-medium">{a.msg}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── HistoryPage ─────────────────────────────────────────────────────────────

    function HistoryPage() {
      const [history, setHistory] = useState(null);
      const [metric, setMetric]   = useState('gold');
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        fetch('/api/history')
          .then(r => r.json())
          .then(setHistory)
          .catch(() => setHistory([]));
      }, []);

      useEffect(() => {
        if (!history || history.length === 0 || !chartRef.current) return;
        if (chartInstance.current) { chartInstance.current.destroy(); }

        const labels = history.map(h => {
          const d = new Date(h.timestamp * 1000);
          return d.toLocaleString('pt-PT', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        });

        const datasets = [];
        const colors = ['#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#a855f7'];

        if (metric === 'gold') {
          datasets.push({ label: 'Ouro', data: history.map(h => h.gold.total), borderColor: colors[0], backgroundColor: colors[0]+'22', tension: 0.3, fill: true });
          datasets.push({ label: 'Prod. Ouro/h', data: history.map(h => h.gold.production), borderColor: colors[1], backgroundColor: colors[1]+'22', tension: 0.3, fill: false, yAxisID: 'y2' });
        } else if (metric === 'resources') {
          MATERIALS.forEach((m, i) => {
            datasets.push({ label: m.pt, data: history.map(h => h.resources.available[i]), borderColor: colors[i % colors.length], tension: 0.3, fill: false });
          });
        } else if (metric === 'ships') {
          datasets.push({ label: 'Navios disponíveis', data: history.map(h => h.ships.available), borderColor: colors[0], tension: 0.3, fill: false });
          datasets.push({ label: 'Navios totais',      data: history.map(h => h.ships.total),     borderColor: colors[1], tension: 0.3, fill: false });
        } else if (metric === 'citizens') {
          datasets.push({ label: 'Cidadãos',            data: history.map(h => h.housing.citizens), borderColor: colors[2], tension: 0.3, fill: false });
          datasets.push({ label: 'Espaço habitacional', data: history.map(h => h.housing.space),    borderColor: colors[0], tension: 0.3, fill: false });
        }

        const scales = {
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#e2e8f020' } },
          x: { ticks: { color: '#94a3b8', maxTicksLimit: 12 }, grid: { color: '#e2e8f020' } },
        };
        if (metric === 'gold') {
          scales.y2 = { position: 'right', ticks: { color: '#94a3b8' }, grid: { drawOnChartArea: false } };
        }

        chartInstance.current = new Chart(chartRef.current, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#cbd5e1', font: { size: 12 } } } },
            scales,
          },
        });
      }, [history, metric]);

      const METRICS = [
        { key: 'gold',      label: 'Ouro'       },
        { key: 'resources', label: 'Recursos'    },
        { key: 'ships',     label: 'Navios'      },
        { key: 'citizens',  label: 'Cidadãos'    },
      ];

      return (
        <div>
          <PageHeader icon="fa-chart-line" title="Histórico do Império">
            <div className="flex gap-1">
              {METRICS.map(m => (
                <button
                  key={m.key}
                  onClick={() => setMetric(m.key)}
                  className={`px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${metric === m.key ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                >
                  {m.label}
                </button>
              ))}
            </div>
          </PageHeader>

          <Card>
            <div className="bg-slate-800 rounded-xl p-4" style={{ height: '360px' }}>
              {!history ? (
                <div className="flex items-center justify-center h-full text-slate-400 text-sm">A carregar histórico…</div>
              ) : history.length === 0 ? (
                <div className="flex items-center justify-center h-full text-slate-400 text-sm">
                  Sem dados de histórico ainda. Aguarda o próximo ciclo de actualização.
                </div>
              ) : (
                <canvas ref={chartRef} />
              )}
            </div>
          </Card>

          {history && history.length > 0 && (
            <p className="text-xs text-slate-400 mt-2">
              {history.length} pontos de dados — de {new Date(history[0].timestamp * 1000).toLocaleDateString('pt-PT')} a {new Date(history[history.length-1].timestamp * 1000).toLocaleDateString('pt-PT')}
            </p>
          )}
        </div>
      );
    }

    // ─── NumInput helper ─────────────────────────────────────────────────────────

    function NumInput({ label, value, onChange, min = 0, step = 1 }) {
      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs font-medium text-slate-500 flex items-center gap-1">{label}</label>
          <input
            type="number"
            min={min}
            step={step}
            value={value === 0 ? '' : value}
            onChange={e => onChange(e.target.value === '' ? 0 : Number(e.target.value))}
            placeholder="0"
            className="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700 w-full font-mono"
          />
        </div>
      );
    }

    function fmtHours(hours) {
      if (!isFinite(hours) || hours > 1e9) return '∞';
      if (hours <= 0) return 'Disponível agora!';
      const totalMins = Math.round(hours * 60);
      const d = Math.floor(totalMins / 1440);
      const h = Math.floor((totalMins % 1440) / 60);
      const m = totalMins % 60;
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function calcUpgradeTime(needed, available, production, gold, goldPrice) {
      const gp      = goldPrice || 15;
      const missing = needed.map((n, i) => Math.max(0, n - (available[i] || 0)));

      // Global sums — all resources treated as equivalent units
      const totalMissing    = missing.reduce((s, m) => s + m, 0);
      const totalProduction = production.reduce((s, p) => s + (p || 0), 0);
      const goldNeededAll   = totalMissing * gp;
      const canBuyAll       = gold >= goldNeededAll;

      const timeNoGold = totalProduction > 0
        ? totalMissing / totalProduction
        : (totalMissing > 0 ? Infinity : 0);

      let timeWithGold = canBuyAll ? 0 : timeNoGold;
      if (!canBuyAll && gold > 0) {
        const goldBuysUnits = gold / gp;
        const stillMissing  = Math.max(0, totalMissing - goldBuysUnits);
        timeWithGold = totalProduction > 0
          ? stillMissing / totalProduction
          : (stillMissing > 0 ? Infinity : 0);
      }

      return { missing, totalMissing, totalProduction, timeNoGold, timeWithGold, goldNeededAll, canBuyAll };
    }

    // cost keys from empireFunction match materials_names_tec order
    const COST_KEYS = ['wood', 'wine', 'marble', 'glass', 'sulfur'];

    function fmtTs(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // ─── BuildingUpgradeCalc ──────────────────────────────────────────────────────

    function BuildingUpgradeCalc({ data }) {
      const { statusSummary } = data;
      const gold       = statusSummary.gold.total;
      const available  = statusSummary.resources.available;
      const production = statusSummary.resources.production;

      const [needed,    setNeeded]    = useState([0, 0, 0, 0, 0]);
      const [goldPrice, setGoldPrice] = useState(15);

      // Building costs data from API
      const [costsData,    setCostsData]    = useState(null);
      const [costsLoading, setCostsLoading] = useState(true);
      const [costsError,   setCostsError]   = useState(null);
      const [refreshMsg,   setRefreshMsg]   = useState('');

      // Auto-fill selection
      const [selCity,        setSelCity]        = useState('');
      const [selBuilding,    setSelBuilding]     = useState('');
      const [selTargetLevel, setSelTargetLevel]  = useState('');

      useEffect(() => {
        fetch('/api/building-costs')
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(d => { setCostsData(d); setCostsLoading(false); })
          .catch(() => { setCostsLoading(false); setCostsError('Dados de custos ainda não disponíveis. O bot irá extraí-los no próximo ciclo.'); });
      }, []);

      // Reset building+level when city changes
      useEffect(() => { setSelBuilding(''); setSelTargetLevel(''); }, [selCity]);

      // Reset level+costs when building changes
      useEffect(() => { setSelTargetLevel(''); setNeeded([0, 0, 0, 0, 0]); }, [selBuilding]);

      // Auto-fill costs when full selection is made
      useEffect(() => {
        if (!costsData || !selCity || !selBuilding || !selTargetLevel) return;
        const bData = costsData.cities?.[selCity]?.[selBuilding];
        if (!bData) return;
        const target = parseInt(selTargetLevel, 10);
        const totals = [0, 0, 0, 0, 0];
        for (let lv = bData.currentLevel + 1; lv <= target; lv++) {
          const lvCost = bData.costs[String(lv)];
          if (lvCost) COST_KEYS.forEach((k, i) => { totals[i] += lvCost[k] || 0; });
        }
        setNeeded(totals);
      }, [selCity, selBuilding, selTargetLevel, costsData]);

      const handleForceRefresh = () => {
        setRefreshMsg('A enviar pedido…');
        fetch('/api/building-costs/refresh', { method: 'POST' })
          .then(r => r.json())
          .then(() => setRefreshMsg('✓ Agendado! A extração começa no próximo ciclo do bot (máx. 1h).'))
          .catch(() => setRefreshMsg('Erro ao agendar atualização.'));
      };

      const handleClear = () => { setSelCity(''); setSelBuilding(''); setSelTargetLevel(''); setNeeded([0, 0, 0, 0, 0]); };

      const citiesWithData   = costsData ? Object.keys(costsData.cities || {}) : [];
      const buildingsForCity = selCity && costsData?.cities?.[selCity] ? Object.keys(costsData.cities[selCity]) : [];
      const selBuildingData  = selCity && selBuilding && costsData?.cities?.[selCity]?.[selBuilding];
      const availableLevels  = selBuildingData ? Object.keys(selBuildingData.costs).map(Number).sort((a, b) => a - b) : [];
      const autoFilled       = selTargetLevel !== '';

      const setRes = (i, v) => setNeeded(prev => { const n = [...prev]; n[i] = v; return n; });
      const r = calcUpgradeTime(needed, available, production, gold, goldPrice);
      const hasInput = needed.some(n => n > 0);

      const selectCls = "border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed";

      return (
        <div className="space-y-5">
          <div className="bg-indigo-50 border border-indigo-200 rounded-xl px-5 py-4 text-sm text-indigo-700 flex items-start gap-3">
            <i className="fa-solid fa-circle-info mt-0.5 flex-shrink-0" />
            <span>
              Calcula o tempo estimado para teres recursos suficientes para evoluir qualquer edifício.
              Seleciona cidade, edifício e nível alvo para preenchimento automático — ou introduz os valores manualmente.
              Considera a produção total do império, os recursos disponíveis e a compra com ouro.
            </span>
          </div>

          {/* ── Auto-fill panel ── */}
          {costsLoading && (
            <div className="flex items-center gap-2 text-slate-400 text-sm px-1">
              <div className="w-4 h-4 rounded-full border-2 border-slate-300 border-t-indigo-400 animate-spin" />
              A carregar custos de edifícios…
            </div>
          )}

          {!costsLoading && costsError && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-4 flex items-start justify-between gap-4">
              <div className="flex items-start gap-3 text-sm text-amber-700">
                <i className="fa-solid fa-triangle-exclamation mt-0.5 flex-shrink-0" />
                <span>{costsError}</span>
              </div>
              <button
                onClick={handleForceRefresh}
                className="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white text-xs font-medium rounded-lg transition-colors"
              >
                <i className="fa-solid fa-rotate" /> Solicitar extração
              </button>
            </div>
          )}

          {!costsLoading && costsData && (
            <Card>
              <CardHeader icon="fa-wand-magic-sparkles" title="Preenchimento Automático" />
              <div className="p-5">
                <div className="flex flex-wrap gap-4 items-end mb-4">
                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-medium text-slate-500">Cidade</label>
                    <select className={selectCls} value={selCity} onChange={e => setSelCity(e.target.value)}>
                      <option value="">— Seleciona —</option>
                      {citiesWithData.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>

                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-medium text-slate-500">Edifício</label>
                    <select className={selectCls} value={selBuilding} onChange={e => setSelBuilding(e.target.value)} disabled={!selCity}>
                      <option value="">— Seleciona —</option>
                      {buildingsForCity.map(b => {
                        const lvl = costsData.cities[selCity][b].currentLevel;
                        return <option key={b} value={b}>{b} (nível {lvl})</option>;
                      })}
                    </select>
                  </div>

                  {selBuildingData && (
                    <div className="flex flex-col gap-1">
                      <label className="text-xs font-medium text-slate-500">
                        Nível atual: <strong>{selBuildingData.currentLevel}</strong> → Evoluir até
                      </label>
                      <select className={selectCls} value={selTargetLevel} onChange={e => setSelTargetLevel(e.target.value)}>
                        <option value="">— Seleciona —</option>
                        {availableLevels.map(lv => <option key={lv} value={lv}>{lv}</option>)}
                      </select>
                    </div>
                  )}

                  {autoFilled && (
                    <button
                      onClick={handleClear}
                      className="flex items-center gap-1.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-medium rounded-lg transition-colors"
                    >
                      <i className="fa-solid fa-xmark" /> Limpar
                    </button>
                  )}
                </div>

                <div className="flex flex-wrap items-center justify-between gap-2 pt-3 border-t border-slate-100">
                  <p className="text-xs text-slate-400">
                    <i className="fa-regular fa-clock mr-1" />
                    Última extração: <span className="font-medium">{fmtTs(costsData.lastUpdated)}</span>
                    <span className="ml-2 text-slate-300">(atualiza de 3 em 3 dias)</span>
                  </p>
                  <div className="flex items-center gap-3">
                    {refreshMsg && <span className="text-xs text-emerald-600 font-medium">{refreshMsg}</span>}
                    <button
                      onClick={handleForceRefresh}
                      className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium rounded-lg transition-colors"
                    >
                      <i className="fa-solid fa-rotate" /> Forçar atualização
                    </button>
                  </div>
                </div>
              </div>
            </Card>
          )}

          {/* ── Resource inputs ── */}
          <Card>
            <CardHeader icon="fa-boxes-stacked" title={autoFilled
              ? `Recursos: ${selBuilding} (nível ${selBuildingData?.currentLevel} → ${selTargetLevel})`
              : 'Recursos Necessários para o Próximo Nível'
            } />
            <div className="p-5">
              {autoFilled && (
                <div className="mb-4 flex items-center gap-2 text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
                  <i className="fa-solid fa-circle-check" />
                  Valores preenchidos automaticamente — podes editá-los manualmente.
                </div>
              )}
              <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-4 mb-5">
                {MATERIALS.map((m, i) => (
                  <NumInput
                    key={m.en}
                    label={<><i className={`fa-solid ${m.icon} ${m.color}`} /> {m.pt}</>}
                    value={needed[i]}
                    onChange={v => setRes(i, v)}
                  />
                ))}
              </div>
              <div className="w-44">
                <NumInput
                  label={<><i className="fa-solid fa-coins text-yellow-500" /> Preço ouro/unidade</>}
                  value={goldPrice}
                  onChange={setGoldPrice}
                  min={1}
                />
              </div>
            </div>
          </Card>

          {hasInput && (
            <Card>
              <CardHeader icon="fa-table-list" title="Estado dos Recursos" />
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                      <Th align="text-left" className="px-5">Recurso</Th>
                      <Th>Necessário</Th>
                      <Th>Disponível</Th>
                      <Th>Em Falta</Th>
                      <Th>Produção/h</Th>
                    </tr>
                  </thead>
                  <tbody>
                    {MATERIALS.map((m, i) => {
                      const miss = r.missing[i];
                      return (
                        <tr key={m.en} className="border-b border-slate-100 hover:bg-slate-50">
                          <Td className="px-5 font-semibold text-slate-700">
                            <i className={`fa-solid ${m.icon} mr-1.5 ${m.color}`} />{m.pt}
                          </Td>
                          <Td className="text-center font-mono">{fmt(needed[i])}</Td>
                          <Td className="text-center font-mono">{fmt(available[i])}</Td>
                          <Td className={`text-center font-mono font-bold ${miss > 0 ? 'text-red-500' : 'text-emerald-500'}`}>
                            {miss > 0 ? `−${fmt(miss)}` : <i className="fa-solid fa-check" />}
                          </Td>
                          <Td className="text-center font-mono text-slate-500">{fmt(production[i])}</Td>
                        </tr>
                      );
                    })}
                    <tr className="bg-slate-800 text-white text-xs font-bold">
                      <td className="px-5 py-2.5 text-left">TOTAL</td>
                      <td className="px-3 py-2.5 text-center font-mono">{fmt(needed.reduce((s,v)=>s+v,0))}</td>
                      <td className="px-3 py-2.5 text-center font-mono">{fmt(available.reduce((s,v)=>s+v,0))}</td>
                      <td className={`px-3 py-2.5 text-center font-mono ${r.totalMissing > 0 ? 'text-red-300' : 'text-emerald-300'}`}>
                        {r.totalMissing > 0 ? `−${fmt(r.totalMissing)}` : <i className="fa-solid fa-check" />}
                      </td>
                      <td className="px-3 py-2.5 text-center font-mono text-slate-300">{fmt(r.totalProduction)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          {hasInput && (
            <Card>
              <CardHeader icon="fa-clock" title="Estimativa de Tempo para Evolução" />
              <div className="p-5">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div className={`rounded-xl border-2 p-4 text-center ${r.timeNoGold === 0 ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-ban mr-1 text-slate-400" />Sem comprar com ouro
                    </div>
                    <div className={`text-2xl font-bold mt-2 ${r.timeNoGold === 0 ? 'text-emerald-600' : 'text-slate-700'}`}>
                      {r.timeNoGold === 0 ? 'Já tens tudo!' : fmtHours(r.timeNoGold)}
                    </div>
                    <div className="text-xs text-slate-400 mt-2">Apenas produção do império</div>
                  </div>

                  <div className={`rounded-xl border-2 p-4 text-center ${r.canBuyAll ? 'border-emerald-400 bg-emerald-50' : 'border-indigo-300 bg-indigo-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-coins mr-1 text-yellow-500" />Com ouro disponível
                    </div>
                    <div className="text-xs text-yellow-700 font-semibold mb-2">{fmt(gold)} ouro</div>
                    <div className={`text-2xl font-bold ${r.canBuyAll ? 'text-emerald-600' : 'text-indigo-600'}`}>
                      {r.canBuyAll ? 'Já tens tudo!' : fmtHours(r.timeWithGold)}
                    </div>
                    {!r.canBuyAll && r.timeWithGold < r.timeNoGold && (
                      <div className="text-xs text-indigo-500 mt-2 font-semibold">
                        Poupa {fmtHours(r.timeNoGold - r.timeWithGold)}
                      </div>
                    )}
                  </div>

                  <div className={`rounded-xl border-2 p-4 text-center ${r.canBuyAll ? 'border-emerald-400 bg-emerald-50' : 'border-yellow-300 bg-yellow-50'}`}>
                    <div className="text-xs text-slate-500 mb-1 font-medium">
                      <i className="fa-solid fa-bag-shopping mr-1" />Comprar tudo já
                    </div>
                    <div className={`text-2xl font-bold mt-2 ${r.canBuyAll ? 'text-emerald-600' : 'text-yellow-700'}`}>
                      {fmt(r.goldNeededAll)} ouro
                    </div>
                    <div className={`text-xs mt-2 font-semibold ${r.canBuyAll ? 'text-emerald-500' : 'text-red-500'}`}>
                      {r.canBuyAll ? '✓ Tens ouro suficiente!' : `Faltam ${fmt(Math.round(r.goldNeededAll - gold))} ouro`}
                    </div>
                  </div>
                </div>
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ─── ROICalc ──────────────────────────────────────────────────────────────────

    function ROICalc({ data }) {
      const [resType,    setResType]    = useState('wood');
      const [numCities,  setNumCities]  = useState(2);
      const [gainIsland, setGainIsland] = useState(0);
      const [costIsland, setCostIsland] = useState([0, 0, 0, 0, 0]);
      const [gainCity,   setGainCity]   = useState(0);
      const [costCity,   setCostCity]   = useState([0, 0, 0, 0, 0]);
      const [goldPrice,  setGoldPrice]  = useState(15);

      const setCostI = (i, v) => setCostIsland(p => { const c = [...p]; c[i] = v; return c; });
      const setCostC = (i, v) => setCostCity(p => { const c = [...p]; c[i] = v; return c; });

      const isWood        = resType === 'wood';
      const islandBldName = isWood ? 'Serraria' : 'Pedreira';
      const cityBldName   = isWood ? 'Guarda Florestal' : 'Pedreiro';
      const resIcon       = isWood ? 'fa-tree' : 'fa-mountain';
      const resColorCls   = isWood ? 'text-green-500' : 'text-slate-400';
      const resPt         = isWood ? 'Madeira' : 'Mármore';

      const totalIslandGain = gainIsland * numCities;
      const totalCityGain   = gainCity;

      const costIslandGold = costIsland.reduce((s, v) => s + v * goldPrice, 0);
      const costCityGold   = costCity.reduce((s, v) => s + v * goldPrice, 0);

      const roiIsland = costIslandGold > 0 ? totalIslandGain / costIslandGold : null;
      const roiCity   = costCityGold   > 0 ? totalCityGain   / costCityGold   : null;

      const islandWins = roiIsland !== null && (roiCity === null || roiIsland > roiCity);
      const cityWins   = roiCity   !== null && (roiIsland === null || roiCity > roiIsland);
      const showCompare = (totalIslandGain > 0 || totalCityGain > 0) && (costIslandGold > 0 || costCityGold > 0);
      const maxRoi = Math.max(roiIsland || 0, roiCity || 0);

      return (
        <div className="space-y-5">
          <div className="bg-indigo-50 border border-indigo-200 rounded-xl px-5 py-4 text-sm text-indigo-700 flex items-start gap-3">
            <i className="fa-solid fa-circle-info mt-0.5 flex-shrink-0" />
            <span>
              Compara o retorno por ouro investido (ROI) entre evoluir o edifício da <strong>ilha</strong> (beneficia todas as cidades)
              vs o edifício da <strong>cidade</strong> (beneficia apenas essa cidade).
              Introduz o ganho de produção do nível seguinte (visível no jogo) e o custo de evolução.
            </span>
          </div>

          <Card>
            <CardHeader icon="fa-sliders" title="Configuração" />
            <div className="p-5 flex flex-wrap gap-5 items-end">
              <div>
                <p className="text-xs font-medium text-slate-500 mb-2">Tipo de recurso</p>
                <div className="flex gap-2">
                  <button
                    onClick={() => setResType('wood')}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${resType === 'wood' ? 'bg-green-600 text-white border-green-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                  >
                    <i className="fa-solid fa-tree" /> Madeira
                  </button>
                  <button
                    onClick={() => setResType('marble')}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${resType === 'marble' ? 'bg-slate-600 text-white border-slate-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                  >
                    <i className="fa-solid fa-mountain" /> Mármore
                  </button>
                </div>
              </div>
              <div className="w-36">
                <NumInput label="Nº de cidades na ilha" value={numCities} onChange={setNumCities} min={1} />
              </div>
              <div className="w-44">
                <NumInput
                  label={<><i className="fa-solid fa-coins text-yellow-500" /> Preço ouro/unidade</>}
                  value={goldPrice}
                  onChange={setGoldPrice}
                  min={1}
                />
              </div>
            </div>
          </Card>

          <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
            {/* Island building panel */}
            <Card className={islandWins ? 'ring-2 ring-emerald-400' : ''}>
              <CardHeader icon="fa-globe" title={`${islandBldName} (Ilha)`} />
              <div className="p-5 space-y-4">
                <div className="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700">
                  <i className="fa-solid fa-city mr-1" />
                  Beneficia <strong>todas as {numCities} cidades</strong> da ilha.
                  Ganho total = ganho/cidade × {numCities}.
                </div>
                <NumInput
                  label={<><i className={`fa-solid ${resIcon} ${resColorCls}`} /> Ganho {resPt}/h por cidade (nível seguinte)</>}
                  value={gainIsland}
                  onChange={setGainIsland}
                  min={0}
                />
                <div>
                  <p className="text-xs font-medium text-slate-500 mb-2">Custo de evolução:</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    {MATERIALS.map((m, i) => (
                      <NumInput
                        key={m.en}
                        label={<><i className={`fa-solid ${m.icon} ${m.color}`} /> {m.pt}</>}
                        value={costIsland[i]}
                        onChange={v => setCostI(i, v)}
                      />
                    ))}
                  </div>
                </div>
                <div className={`rounded-xl border-2 p-4 ${islandWins ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="text-xs text-slate-500 mb-1">Ganho Total</div>
                      <div className="text-2xl font-bold text-slate-800">
                        {fmt(totalIslandGain)} <span className="text-sm font-normal text-slate-400">{resPt}/h</span>
                      </div>
                    </div>
                    {islandWins && <i className="fa-solid fa-trophy text-3xl text-yellow-500" />}
                  </div>
                  <div className="text-xs text-slate-500 mt-2">Custo equiv.: {fmt(costIslandGold)} ouro</div>
                  {roiIsland !== null && (
                    <div className="text-xs font-semibold text-indigo-600 mt-1">
                      ROI: {roiIsland.toFixed(5)} {resPt}/ouro
                    </div>
                  )}
                  {islandWins && (
                    <div className="text-xs text-emerald-600 font-bold mt-2">
                      <i className="fa-solid fa-check-circle mr-1" />Melhor opção!
                    </div>
                  )}
                </div>
              </div>
            </Card>

            {/* City building panel */}
            <Card className={cityWins ? 'ring-2 ring-emerald-400' : ''}>
              <CardHeader icon="fa-house" title={`${cityBldName} (Cidade)`} />
              <div className="p-5 space-y-4">
                <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700">
                  <i className="fa-solid fa-house mr-1" />
                  Beneficia <strong>apenas esta cidade</strong>. Não afecta as outras cidades da ilha.
                </div>
                <NumInput
                  label={<><i className={`fa-solid ${resIcon} ${resColorCls}`} /> Ganho {resPt}/h nesta cidade (nível seguinte)</>}
                  value={gainCity}
                  onChange={setGainCity}
                  min={0}
                />
                <div>
                  <p className="text-xs font-medium text-slate-500 mb-2">Custo de evolução:</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    {MATERIALS.map((m, i) => (
                      <NumInput
                        key={m.en}
                        label={<><i className={`fa-solid ${m.icon} ${m.color}`} /> {m.pt}</>}
                        value={costCity[i]}
                        onChange={v => setCostC(i, v)}
                      />
                    ))}
                  </div>
                </div>
                <div className={`rounded-xl border-2 p-4 ${cityWins ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="text-xs text-slate-500 mb-1">Ganho Total</div>
                      <div className="text-2xl font-bold text-slate-800">
                        {fmt(totalCityGain)} <span className="text-sm font-normal text-slate-400">{resPt}/h</span>
                      </div>
                    </div>
                    {cityWins && <i className="fa-solid fa-trophy text-3xl text-yellow-500" />}
                  </div>
                  <div className="text-xs text-slate-500 mt-2">Custo equiv.: {fmt(costCityGold)} ouro</div>
                  {roiCity !== null && (
                    <div className="text-xs font-semibold text-indigo-600 mt-1">
                      ROI: {roiCity.toFixed(5)} {resPt}/ouro
                    </div>
                  )}
                  {cityWins && (
                    <div className="text-xs text-emerald-600 font-bold mt-2">
                      <i className="fa-solid fa-check-circle mr-1" />Melhor opção!
                    </div>
                  )}
                </div>
              </div>
            </Card>
          </div>

          {showCompare && (
            <Card>
              <CardHeader icon="fa-scale-balanced" title="Comparação de ROI" />
              <div className="p-5 space-y-4">
                {[
                  { label: `${islandBldName} (Ilha)`,    gain: totalIslandGain, costGold: costIslandGold, roi: roiIsland, wins: islandWins },
                  { label: `${cityBldName} (Cidade)`,    gain: totalCityGain,   costGold: costCityGold,   roi: roiCity,   wins: cityWins   },
                ].map((opt, i) => {
                  const barPct = maxRoi > 0 && opt.roi !== null ? Math.round((opt.roi / maxRoi) * 100) : 0;
                  return (
                    <div key={i}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-sm font-semibold text-slate-700 flex items-center gap-1">
                          {opt.wins && <i className="fa-solid fa-trophy text-yellow-500 text-xs" />}
                          {opt.label}
                        </span>
                        <div className="text-xs text-slate-500 text-right">
                          +{fmt(opt.gain)} {resPt}/h &nbsp;|&nbsp; {fmt(opt.costGold)} ouro
                          {opt.roi !== null && <span className="ml-2 font-semibold text-indigo-600">ROI: {opt.roi.toFixed(5)}</span>}
                        </div>
                      </div>
                      <div className="w-full h-5 bg-slate-100 rounded-full overflow-hidden">
                        <div
                          className={`h-full rounded-full transition-all duration-500 flex items-center justify-end pr-2 text-white text-xs font-bold ${opt.wins ? 'bg-emerald-500' : 'bg-indigo-400'}`}
                          style={{ width: `${Math.max(barPct, 2)}%` }}
                        >
                          {barPct > 15 ? `${barPct}%` : ''}
                        </div>
                      </div>
                    </div>
                  );
                })}
                {(islandWins || cityWins) && (
                  <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 text-sm text-emerald-800 font-medium">
                    <i className="fa-solid fa-lightbulb mr-2 text-yellow-500" />
                    {islandWins
                      ? `Evoluir a ${islandBldName} é mais vantajoso: beneficia ${numCities} cidades por o mesmo investimento.`
                      : `Evoluir o ${cityBldName} é mais vantajoso: melhor retorno por ouro investido nesta configuração.`
                    }
                  </div>
                )}
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ─── CalculadorasPage ─────────────────────────────────────────────────────────

    function CalculadorasPage({ data }) {
      const [tab, setTab] = useState('upgrade');
      const tabs = [
        { key: 'upgrade', label: 'Evolução de Edifícios',    icon: 'fa-building-columns' },
        { key: 'roi',     label: 'ROI Serraria / Pedreira',  icon: 'fa-scale-balanced'   },
      ];
      return (
        <div>
          <PageHeader icon="fa-calculator" title="Calculadoras" />
          <div className="flex gap-2 mb-6 flex-wrap">
            {tabs.map(t => (
              <button
                key={t.key}
                onClick={() => setTab(t.key)}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border transition-colors ${
                  tab === t.key
                    ? 'bg-indigo-600 text-white border-indigo-600 shadow'
                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                }`}
              >
                <i className={`fa-solid ${t.icon}`} />
                {t.label}
              </button>
            ))}
          </div>
          {tab === 'upgrade' && <BuildingUpgradeCalc data={data} />}
          {tab === 'roi'     && <ROICalc data={data} />}
        </div>
      );
    }

    // ─── MundoPage ───────────────────────────────────────────────────────────────

    const MARK_CONFIG = {
      novo:    { label: 'Novo',    bg: 'bg-blue-100',   text: 'text-blue-700',   ring: 'ring-blue-300'   },
      alvo:    { label: 'Alvo',    bg: 'bg-orange-100', text: 'text-orange-700', ring: 'ring-orange-300' },
      visto:   { label: 'Visto',   bg: 'bg-slate-100',  text: 'text-slate-500',  ring: 'ring-slate-300'  },
      ignorar: { label: 'Ignorar', bg: 'bg-slate-50',   text: 'text-slate-400',  ring: 'ring-slate-200'  },
    };

    function MarkBadge({ status }) {
      const cfg = MARK_CONFIG[status] || MARK_CONFIG.novo;
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${cfg.bg} ${cfg.text}`}>
          {cfg.label}
        </span>
      );
    }

    function MarkSelect({ playerId, current, onChange }) {
      return (
        <select
          value={current}
          onChange={e => onChange(playerId, e.target.value)}
          className={`text-xs rounded-full px-2 py-0.5 border font-medium cursor-pointer focus:outline-none
            ${MARK_CONFIG[current]?.bg || ''} ${MARK_CONFIG[current]?.text || ''} border-transparent`}
        >
          {Object.entries(MARK_CONFIG).map(([k, v]) => (
            <option key={k} value={k}>{v.label}</option>
          ))}
        </select>
      );
    }

    function parseScore(s) {
      if (!s) return 0;
      return parseInt(String(s).replace(/[,.\s\u00a0]/g, ''), 10) || 0;
    }

    function fmtScore(s) {
      const n = parseScore(s);
      if (!n) return '—';
      return n.toLocaleString('pt-PT');
    }

    function StatePill({ state }) {
      if (state === 'inactive') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">
          <span className="w-1.5 h-1.5 rounded-full bg-red-500 inline-block" /> Inactivo
        </span>
      );
      if (state === 'vacation') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">
          <span className="w-1.5 h-1.5 rounded-full bg-yellow-500 inline-block" /> Férias
        </span>
      );
      return <span className="text-slate-400 text-xs">{state}</span>;
    }

    const RESOURCE_LABELS = ['', 'Vinho', 'Mármore', 'Cristal', 'Enxofre'];
    const RESOURCE_ICONS  = ['', 'fa-wine-bottle', 'fa-mountain', 'fa-gem', 'fa-flask'];
    const RESOURCE_COLORS = ['', 'text-red-400', 'text-slate-400', 'text-cyan-400', 'text-yellow-400'];

    // ─── Inactivos sub-tab ───────────────────────────────────────────────────────

    function InactivosTab({ scanData, scanStatus, loading, error, marks, setMarks, onForceRefresh }) {
      const [filterDist, setFilterDist]   = useState(20);
      const [filterState, setFilterState] = useState('all');
      const [filterMark, setFilterMark]   = useState('excl_ignorar');
      const [filterNew, setFilterNew]     = useState(false);
      const [search, setSearch]           = useState('');
      const [sortKey, setSortKey]         = useState('distance');
      const [sortAsc, setSortAsc]         = useState(true);

      const handleMark = useCallback((playerId, status) => {
        setMarks(prev => ({ ...prev, [playerId]: status }));
        fetch('/api/world-scan/mark', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId, status }),
        }).catch(() => {});
      }, [setMarks]);

      const players = useMemo(() => {
        if (!scanData?.players) return [];
        let list = scanData.players.map(p => ({ ...p, mark: marks[p.playerId] || p.mark || 'novo' }));

        if (filterNew)             list = list.filter(p => p.isNew);
        if (filterState !== 'all') list = list.filter(p => p.state === filterState);
        if (filterMark === 'excl_ignorar') list = list.filter(p => p.mark !== 'ignorar');
        else if (filterMark !== 'all')     list = list.filter(p => p.mark === filterMark);
        if (filterDist > 0)        list = list.filter(p => p.distance <= filterDist);
        if (search.trim())         list = list.filter(p => p.playerName.toLowerCase().includes(search.toLowerCase()));

        list.sort((a, b) => {
          let va, vb;
          if (sortKey === 'distance')  { va = a.distance; vb = b.distance; }
          else if (sortKey === 'army') { va = parseScore(a.scores?.army); vb = parseScore(b.scores?.army); }
          else if (sortKey === 'building') { va = parseScore(a.scores?.building); vb = parseScore(b.scores?.building); }
          else if (sortKey === 'player')   { va = a.playerName.toLowerCase(); vb = b.playerName.toLowerCase(); }
          else                         { va = a[sortKey]; vb = b[sortKey]; }
          if (va < vb) return sortAsc ? -1 : 1;
          if (va > vb) return sortAsc ? 1 : -1;
          return 0;
        });
        return list;
      }, [scanData, marks, filterState, filterMark, filterDist, filterNew, search, sortKey, sortAsc]);

      const newCount = useMemo(() =>
        (scanData?.players || []).filter(p => p.isNew).length, [scanData]);

      const handleSort = (key) => {
        if (sortKey === key) setSortAsc(a => !a);
        else { setSortKey(key); setSortAsc(true); }
      };

      const SortTh = ({ colKey, children, align = 'text-center' }) => (
        <th
          className={`px-3 py-3 font-semibold ${align} whitespace-nowrap cursor-pointer select-none hover:bg-slate-700 transition-colors`}
          onClick={() => handleSort(colKey)}
        >
          {children}
          {sortKey === colKey && <span className="ml-1 opacity-70">{sortAsc ? '↑' : '↓'}</span>}
        </th>
      );

      const handleExportCsv = () => {
        const header = ['Jogador', 'Aliança', 'Estado', 'Novo?', 'Ilha', 'Coord', 'Cidade próxima', 'Dist.',
                        'Score Militar', 'Score Edifícios', 'Rank', 'Marcação'];
        const rows = [header, ...players.map(p => [
          p.playerName, p.allyTag || '—', p.state, p.isNew ? 'Sim' : 'Não',
          p.islandName, `(${p.islandX},${p.islandY})`,
          p.nearestOwnCity, p.distance,
          fmtScore(p.scores?.army), fmtScore(p.scores?.building), p.scores?.rank || '—',
          marks[p.playerId] || 'novo',
        ])];
        exportCsv(`inactivos_${new Date().toISOString().slice(0,10)}.csv`, rows);
      };

      if (loading) return <Card className="p-8 text-center text-slate-400 text-sm">A carregar…</Card>;
      if (error)   return (
        <Card className="p-8 text-center">
          <p className="text-slate-500 text-sm mb-3">{error}</p>
          <button onClick={onForceRefresh} className="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm rounded-lg">
            Forçar primeiro scan
          </button>
        </Card>
      );

      return (
        <div>
          {/* Filters */}
          <Card className="mb-4">
            <div className="px-5 py-3 flex flex-wrap items-center gap-3">
              <button
                onClick={() => setFilterNew(v => !v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${
                  filterNew
                    ? 'bg-emerald-500 text-white border-emerald-500'
                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                }`}
              >
                <i className="fa-solid fa-star" />
                Novos esta semana {newCount > 0 && <span className={`ml-1 px-1.5 rounded-full text-[10px] font-bold ${filterNew ? 'bg-emerald-400 text-white' : 'bg-emerald-100 text-emerald-700'}`}>{newCount}</span>}
              </button>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500 whitespace-nowrap">Dist. máx.</label>
                <select value={filterDist} onChange={e => setFilterDist(Number(e.target.value))}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  {[5, 8, 10, 15, 20, 30, 0].map(v => <option key={v} value={v}>{v === 0 ? 'Todos' : `≤ ${v}`}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500">Estado</label>
                <select value={filterState} onChange={e => setFilterState(e.target.value)}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  <option value="all">Todos</option>
                  <option value="inactive">Inactivos</option>
                  <option value="vacation">Férias</option>
                </select>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs text-slate-500">Marcação</label>
                <select value={filterMark} onChange={e => setFilterMark(e.target.value)}
                  className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  <option value="excl_ignorar">Excluir Ignorados</option>
                  <option value="all">Todos</option>
                  <option value="novo">Apenas Novos</option>
                  <option value="alvo">Apenas Alvos</option>
                  <option value="visto">Apenas Vistos</option>
                </select>
              </div>
              <input type="text" placeholder="Pesquisar jogador…" value={search} onChange={e => setSearch(e.target.value)}
                className="border border-slate-200 rounded-lg px-3 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 flex-1 min-w-[160px]" />
              <button onClick={handleExportCsv}
                className="ml-auto flex items-center gap-1.5 px-3 py-1.5 text-xs text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                <i className="fa-solid fa-download" /> CSV
              </button>
            </div>
          </Card>

          {players.length === 0 ? (
            <Card className="p-8 text-center text-slate-400 text-sm">Nenhum jogador encontrado com os filtros actuais.</Card>
          ) : (
            <Card>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wide">
                      <SortTh colKey="player" align="text-left">Jogador</SortTh>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">Aliança</th>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">Estado</th>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">Ilha</th>
                      <SortTh colKey="distance">Dist.</SortTh>
                      <SortTh colKey="army">Militar</SortTh>
                      <SortTh colKey="building">Edifícios</SortTh>
                      <th className="px-3 py-3 font-semibold text-center whitespace-nowrap">Marcação</th>
                    </tr>
                  </thead>
                  <tbody>
                    {players.map((p, idx) => (
                      <tr key={`${p.playerId}-${p.islandX}-${p.islandY}`}
                        className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${marks[p.playerId] === 'ignorar' ? 'opacity-40' : ''} ${idx % 2 ? 'bg-slate-50/40' : ''}`}>
                        <Td className="font-medium text-slate-800">
                          <div className="flex items-center gap-1.5">
                            {p.playerName}
                            {p.isNew && (
                              <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700">
                                <i className="fa-solid fa-star text-[8px]" /> Novo
                              </span>
                            )}
                          </div>
                        </Td>
                        <Td className="text-center">
                          {p.allyTag
                            ? <span className="px-1.5 py-0.5 bg-indigo-50 text-indigo-700 rounded text-xs font-mono">{p.allyTag}</span>
                            : <span className="text-slate-300">—</span>}
                        </Td>
                        <Td className="text-center"><StatePill state={p.state} /></Td>
                        <Td className="text-center">
                          <span className="text-slate-700 font-medium">{p.islandName}</span>
                          <span className="text-slate-400 text-xs ml-1">({p.islandX},{p.islandY})</span>
                          <br /><span className="text-slate-400 text-xs">{p.cityName}</span>
                        </Td>
                        <Td className="text-center">
                          <span className="font-mono text-slate-700 text-sm font-semibold">{p.distance}</span>
                          <br /><span className="text-slate-400 text-xs">{p.nearestOwnCity}</span>
                        </Td>
                        <Td className="text-center font-mono text-slate-700">
                          {fmtScore(p.scores?.army)}
