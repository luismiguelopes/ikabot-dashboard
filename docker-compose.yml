
services:
  ikabot:
    image: ghcr.io/luismiguelopes/ikabot:latest
    container_name: ikabot
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      TZ: Europe/Lisbon
    env_file:
      - .env
    volumes:
      # Main loop — thin orchestrator
      - ./empireFunction.py:/ikabot/ikabot/function/empireFunction.py
      # Módulos de suporte injectados na mesma pasta para importação relativa
      - ./empire_utils.py:/ikabot/ikabot/function/empire_utils.py
      - ./empire_collector.py:/ikabot/ikabot/function/empire_collector.py
      - ./costs_collector.py:/ikabot/ikabot/function/costs_collector.py
      - ./scan_collector.py:/ikabot/ikabot/function/scan_collector.py
      - ./queue_processor.py:/ikabot/ikabot/function/queue_processor.py
      - ./db_manager.py:/ikabot/ikabot/function/db_manager.py
      - ./telegram_notifier.py:/ikabot/ikabot/function/telegram_notifier.py
      - ./espionage_manager.py:/ikabot/ikabot/function/espionage_manager.py
      # Substitui o helper de rotas por versão com delays humanos entre envios consecutivos
      - ./planRoutes_patched.py:/ikabot/ikabot/helpers/planRoutes.py
      # Fix: read() devolve strings do predetermined_input; int() cast evita TypeError no menu
      - ./loadCustomModule_patched.py:/ikabot/ikabot/function/loadCustomModule.py
      # Pasta Virtual Partilhada
      - ikalogs_volume:/tmp/ikalogs/
    command: >
      python3 -m ikabot ${IKABOT_EMAIL} ${IKABOT_PASSWORD} 21 8 1  /ikabot/ikabot/function/empireFunction.py "" 21 8 3
    ports:
      - "43357:43357"
      - "43573:43573"

  ikabot-gui:
    image: python:3.12-slim
    container_name: ikabot-gui
    restart: unless-stopped
    environment:
      TZ: Europe/Lisbon
    env_file:
      - .env
    volumes:
      # Pega na pasta inteira ./ikabot_gui que está ao lado do compose e mete no contentor
      - ./ikabot_gui:/gui
      - ./db_manager.py:/gui/db_manager.py
      - ./telegram_notifier.py:/gui/telegram_notifier.py
      # A mesma Pasta Virtual Partilhada
      - ikalogs_volume:/tmp/ikalogs/
    working_dir: /gui
    command: >
      bash -c "pip install 'flask==3.1.*' && python app.py"

  frontend:
    image: node:20-alpine
    container_name: ikabot-frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Lisbon
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5001:5173"
    depends_on:
      - ikabot-gui

volumes:
  ikalogs_volume:
